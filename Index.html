<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>北小泳隊：金牌特訓 🏅</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'DotGothic16',monospace;image-rendering:pixelated;user-select:none;touch-action:manipulation;display:flex;align-items:center;justify-content:center;height:100dvh;width:100vw}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;cursor:pointer;box-shadow:0 0 40px rgba(80,160,255,.2)}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<script>
const C=document.getElementById('gc'),X=C.getContext('2d');
let W=800,H=600,SC=1;
function resize(){SC=Math.min(innerWidth/W,innerHeight/H);C.width=W;C.height=H;C.style.width=(W*SC)+'px';C.style.height=(H*SC)+'px';X.imageSmoothingEnabled=false}
resize();addEventListener('resize',resize);

// Audio
let AC=null;function iA(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)()}
function bp(f,d,v=.1,t='square'){if(!AC)return;try{const o=AC.createOscillator(),g=AC.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d)}catch(e){}}
const sfx={perf(){bp(880,.08);setTimeout(()=>bp(1320,.06,.08),50);setTimeout(()=>bp(1760,.08,.06),100)},good(){bp(660,.08,.08)},miss(){bp(180,.25,.12,'sawtooth')},click(){bp(500,.04,.06)},boom(){bp(80,.3,.12,'sawtooth');setTimeout(()=>bp(60,.2,.1,'sawtooth'),80)},pow(){bp(440,.1,.08);setTimeout(()=>bp(660,.1,.08),80);setTimeout(()=>bp(880,.15,.1),160)},go(){bp(880,.2,.12)},ding(){bp(1200,.12,.1);setTimeout(()=>bp(1600,.1,.08),100)},chomp(){bp(300,.06,.08)},ouch(){bp(100,.15,.12,'sawtooth')}};

// Input - multi-touch support for rhythm game
let clicks=[],keys={},tL=false,tR=false,laneHit=[0,0,0,0];
function cp(e){const r=C.getBoundingClientRect();return{x:((e.clientX??(e.touches?.[0]?.clientX??0))-r.left)/SC,y:((e.clientY??(e.touches?.[0]?.clientY??0))-r.top)/SC}}
function hitLane(px2){
  for(let i=0;i<4;i++){const lx=getLX(i),lw=getLW();if(px2>=lx-8&&px2<=lx+lw+8)return i}
  return Math.min(3,Math.floor(px2/(W/4)));
}
C.addEventListener('touchstart',e=>{e.preventDefault();iA();
  for(let i=0;i<e.changedTouches.length;i++){
    const t=e.changedTouches[i];const r=C.getBoundingClientRect();
    const px2=(t.clientX-r.left)/SC,py=(t.clientY-r.top)/SC;
    clicks.push({x:px2,y:py});
    if(G.st===5)laneHit[hitLane(px2)]=1;
    if(G.st===7){if(px2<130&&py>H-170)tL=true;else if(px2>W-130&&py>H-170)tR=true}
  }
},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();tL=tR=false},{passive:false});
C.addEventListener('mousedown',e=>{iA();const p=cp(e);clicks.push(p);
  if(G.st===5)laneHit[hitLane(p.x)]=1;
  if(G.st===7){if(p.x<130&&p.y>H-170)tL=true;else if(p.x>W-130&&p.y>H-170)tR=true}});
C.addEventListener('mouseup',()=>{tL=tR=false});
C.addEventListener('pointermove',e=>{const p=cp(e);G.mx=p.x;G.my=p.y});
addEventListener('keydown',e=>{keys[e.key]=true;
  if(G.st===5){if(e.key==='d'||e.key==='D')laneHit[0]=1;if(e.key==='f'||e.key==='F')laneHit[1]=1;
    if(e.key==='j'||e.key==='J')laneHit[2]=1;if(e.key==='k'||e.key==='K')laneHit[3]=1;}});
addEventListener('keyup',e=>keys[e.key]=false);

// Draw helpers
function px(x,y,w,h,c){X.fillStyle=c;X.fillRect(x|0,y|0,Math.ceil(w),Math.ceil(h))}
function ci(x,y,r,c){X.fillStyle=c;X.beginPath();X.arc(x,y,r,0,6.3);X.fill()}
function ri(x,y,r,c,l=2){X.strokeStyle=c;X.lineWidth=l;X.beginPath();X.arc(x,y,r,0,6.3);X.stroke()}
function T(s,x,y,z,c,a='left'){X.font=`bold ${z}px "DotGothic16"`;X.fillStyle=c;X.textAlign=a;X.textBaseline='middle';X.fillText(s,x|0,y|0)}
function TB(s,x,y,z,c,s2='#000',l=5){X.font=`bold ${z}px "DotGothic16"`;X.textAlign='center';X.textBaseline='middle';X.strokeStyle=s2;X.lineWidth=l;X.strokeText(s,x|0,y|0);X.fillStyle=c;X.fillText(s,x|0,y|0)}
function TW(s,x,y,z,c,mw){X.font=`bold ${z}px "DotGothic16"`;X.fillStyle=c;X.textAlign='left';X.textBaseline='top';let ln='',ly=y;for(let i=0;i<s.length;i++){const t=ln+s[i];if(X.measureText(t).width>mw&&ln){X.fillText(ln,x|0,ly|0);ly+=z+6;ln=s[i]}else ln=t}if(ln)X.fillText(ln,x|0,ly|0)}
function bub(x,y,w,h,px2,py2,bc){
  // Shadow
  X.globalAlpha=.3;px(x+3,y+3,w,h,Bk);X.globalAlpha=1;
  px(x,y,w,h,'#fff');px(x,y,w,4,bc);px(x,y+h-4,w,4,bc);px(x,y,4,h,bc);px(x+w-4,y,4,h,bc);
  X.fillStyle='#fff';X.beginPath();
  if(py2<y){X.moveTo(px2-14,y);X.lineTo(px2,py2);X.lineTo(px2+14,y)}
  else{X.moveTo(px2-14,y+h);X.lineTo(px2,py2);X.lineTo(px2+14,y+h)}
  X.fill();
  X.strokeStyle=bc;X.lineWidth=3;X.beginPath();
  if(py2<y){X.moveTo(px2-14,y);X.lineTo(px2,py2);X.lineTo(px2+14,y)}
  else{X.moveTo(px2-14,y+h);X.lineTo(px2,py2);X.lineTo(px2+14,y+h)}
  X.stroke();
}
// Speed lines helper
function speedLines(cx,cy,n,rMin,rMax,col,alpha,width){
  for(let i=0;i<n;i++){const a=i/n*6.28+G.t*.3;
    X.strokeStyle=col.replace(')',`,${alpha})`).replace('rgb','rgba');
    X.lineWidth=width;X.beginPath();
    X.moveTo(cx+Math.cos(a)*rMin,cy+Math.sin(a)*rMin);
    X.lineTo(cx+Math.cos(a)*rMax,cy+Math.sin(a)*rMax);X.stroke();}
}
const Au='#ffd700',Re='#ff2222',Gn='#33ee55',Wh='#fff',Bk='#111',Go='#44ddff',GoH='#aaffff',Or='#ff8800',
  Sk='#ffcc88',SkD='#cc9960',SkL='#ffe8cc',SkO='#aa7744',SB='#2255cc',SBD='#1a3d99',SBO='#112266',
  SG='#dd2288',SGD='#aa1166',SGO='#771144',Vn='#ff0044';

// ═══════════════════════════════════════
// COACH 沙士 (Sarsaparilla Bottle Coach) — upgraded
// ═══════════════════════════════════════
function drawS(cx,cy,s,a){
  // Ground shadow
  X.globalAlpha=.3;X.fillStyle=Bk;X.beginPath();X.ellipse(cx,cy+13*s,8*s,2*s,0,0,6.3);X.fill();X.globalAlpha=1;
  // Bottle outline
  px(cx-6*s,cy-8*s,12*s,20*s,'#1a0500');
  // Bottle body (dark brown glass gradient)
  px(cx-5.5*s,cy-7.5*s,11*s,19*s,'#441100');
  px(cx-5*s,cy-7*s,10*s,18*s,'#772200');
  px(cx-4.5*s,cy-6.5*s,9*s,17*s,'#993311');
  // Glass highlight stripes (key bottle look)
  px(cx-4*s,cy-6*s,1.2*s,15*s,'#cc6644');
  px(cx-3.6*s,cy-6*s,.4*s,13*s,'#ffaa88');
  // Right-side subtle reflection
  px(cx+3*s,cy-5*s,.4*s,12*s,'#bb5533');
  // Bottle neck
  px(cx-2.5*s,cy-9.5*s,5*s,2*s,'#2a0800');
  px(cx-2*s,cy-9*s,4*s,1.5*s,'#551100');
  // Bottle cap (metallic red with gold rim)
  px(cx-3.3*s,cy-13.5*s,6.6*s,4.5*s,'#660000');
  px(cx-3*s,cy-13*s,6*s,4*s,'#cc0000');
  px(cx-2.5*s,cy-12.8*s,5*s,1.2*s,'#ff4422');// top shine
  // Gold rim
  px(cx-3.6*s,cy-14.2*s,7.2*s,1*s,'#ffcc00');
  px(cx-3.6*s,cy-14.2*s,7.2*s,.4*s,'#ffee66');
  // Serrated cap edge (little notches)
  for(let i=0;i<5;i++)px(cx-3*s+i*1.5*s,cy-13.5*s,.6*s,.6*s,'#770000');
  // Label (cream white with red accent strips)
  px(cx-5.2*s,cy-1.5*s,10.4*s,7*s,'#331100');// label shadow
  px(cx-5*s,cy-1.3*s,10*s,6.5*s,'#fff0d8');
  px(cx-5*s,cy-1.3*s,10*s,1*s,'#dd0000');
  px(cx-5*s,cy+4.2*s,10*s,1*s,'#dd0000');
  // Label text
  T('沙士',cx,cy+1.7*s,3.3*s,'#cc1100','center');
  // Face on upper bottle
  const fl=a>.7&&G.fr%20<8;
  // Eye shadows
  px(cx-4.5*s,cy-7*s,4*s,3.5*s,Bk);
  px(cx+.5*s,cy-7*s,4*s,3.5*s,Bk);
  // Eye colors
  px(cx-4*s,cy-6.5*s,3*s,2.5*s,fl?'#ddeeff':'#4477aa');
  px(cx+1*s,cy-6.5*s,3*s,2.5*s,fl?'#ddeeff':'#4477aa');
  if(!fl){
    px(cx-2*s,cy-5*s,.9*s,.9*s,Wh);
    px(cx+2.5*s,cy-5*s,.9*s,.9*s,Wh);
  }
  // Angry eyebrows
  if(a>.3){
    px(cx-4.5*s,cy-8.7*s,4*s,1.8*s,Bk);
    // slanted eyebrow
    px(cx-4*s,cy-9*s,3*s,.8*s,Bk);
    px(cx+.5*s,cy-8.7*s,4*s,1.8*s,Bk);
    px(cx+1.5*s,cy-9*s,3*s,.8*s,Bk);
  }
  // Mouth
  if(a>.6){
    px(cx-2.5*s,cy-3.5*s,5*s,2.8*s,Bk);
    px(cx-2*s,cy-3.5*s,4*s,1*s,Wh);
    // Teeth
    px(cx-1.5*s,cy-2.8*s,1*s,1.2*s,Wh);
    px(cx+.5*s,cy-2.8*s,1*s,1.2*s,Wh);
  }else{
    px(cx-2*s,cy-3*s,4*s,1*s,'#aa7744');
  }
  // Arms
  const armShake=a>.5?Math.sin(G.t*15)*s*.3:0;
  px(cx-6.8*s,cy-3*s+armShake,2*s,6*s,Sk);
  px(cx+4.8*s,cy-3*s-armShake,2*s,6*s,Sk);
  // Fists
  px(cx-7*s,cy+2*s+armShake,2.4*s,2*s,Sk);
  px(cx+4.6*s,cy+2*s-armShake,2.4*s,2*s,Sk);
  // Fizzing bubbles (only when angry — comes out top of bottle)
  if(a>.4){
    for(let i=0;i<5;i++){
      const phase=(G.t*1.5+i*.3)%1;
      const bx=cx-2*s+Math.sin(phase*6+i)*2*s;
      const by=cy-14*s-phase*20*s;
      X.globalAlpha=(1-phase)*.8;
      ci(bx,by,1+phase*1.5,'#ffeecc');
      X.globalAlpha=1;
    }
    // Anger vein on bottle
    const v=.5+Math.sin(G.t*10)*.3;X.globalAlpha=v;
    px(cx+3*s,cy-11.5*s,1.2*s,.4*s,Vn);
    px(cx+2.8*s,cy-11.2*s,.4*s,1.4*s,Vn);
    px(cx+3.8*s,cy-11.2*s,.4*s,1.4*s,Vn);
    X.globalAlpha=1;
  }
}

// ═══════════════════════════════════════
// COACH 鳳梨 (Pineapple Coach) — upgraded
// ═══════════════════════════════════════
function drawP(cx,cy,s,a){
  // Ground shadow
  X.globalAlpha=.3;X.fillStyle=Bk;X.beginPath();X.ellipse(cx,cy+12.5*s,8*s,2*s,0,0,6.3);X.fill();X.globalAlpha=1;
  // Body outline
  px(cx-6*s,cy-6*s,12*s,16*s,'#331100');
  // Main body (warm gradient)
  px(cx-5.5*s,cy-5.5*s,11*s,15*s,'#aa5500');
  px(cx-5*s,cy-5*s,10*s,14*s,'#dd8800');
  px(cx-4.5*s,cy-4.5*s,9*s,13*s,'#ffbb22');
  // Body highlight
  px(cx-3.5*s,cy-4*s,2.5*s,11*s,'#ffdd66');
  px(cx-3.5*s,cy-4*s,.8*s,11*s,'#ffee99');
  // Diamond scale pattern
  for(let r=0;r<6;r++){
    for(let c=0;c<5;c++){
      const ox=cx-4.5*s+c*2*s+(r%2)*s;
      const oy=cy-4*s+r*2.2*s;
      if(oy>cy+8*s||ox<cx-4.8*s||ox>cx+3.8*s)continue;
      // Diamond outline
      px(ox,oy,.6*s,.6*s,'#663300');
      px(ox+.6*s,oy+.6*s,.6*s,.6*s,'#663300');
      px(ox-.6*s,oy+.6*s,.6*s,.6*s,'#663300');
      px(ox+1.2*s,oy+.6*s,.6*s,.6*s,'#663300');
      // Diamond center highlight
      if(r%2===0&&c%2===0)px(ox+.3*s,oy+.3*s,.4*s,.4*s,'#ffee99');
    }
  }
  // Leaves - back layer
  px(cx-2.5*s,cy-13*s,1.5*s,7*s,'#116611');
  px(cx+1*s,cy-13*s,1.5*s,7*s,'#116611');
  // Leaves - main (3 pointed)
  px(cx-1.5*s,cy-14*s,3*s,9*s,'#33aa33');
  px(cx-1*s,cy-15*s,2*s,2*s,'#33aa33');// tip
  px(cx-4.5*s,cy-11*s,2.5*s,7*s,'#44bb44');
  px(cx-4*s,cy-12*s,1.5*s,2*s,'#44bb44');// tip
  px(cx+2*s,cy-11*s,2.5*s,7*s,'#44bb44');
  px(cx+2.5*s,cy-12*s,1.5*s,2*s,'#44bb44');// tip
  // Leaf highlights
  px(cx-.5*s,cy-13*s,1*s,8*s,'#88dd66');
  px(cx-3.5*s,cy-10*s,.6*s,5*s,'#77cc55');
  px(cx+2.5*s,cy-10*s,.6*s,5*s,'#77cc55');
  // Hot-blooded hachimaki (red headband with white dot)
  px(cx-5.3*s,cy-5.8*s,10.6*s,1.8*s,'#330000');
  px(cx-5*s,cy-5.6*s,10*s,1.4*s,'#dd1122');
  // Hachimaki knot trailing
  px(cx-5*s,cy-4.5*s,.8*s,2*s,'#dd1122');
  px(cx-5.5*s,cy-3.5*s,.8*s,2*s,'#dd1122');
  // White circle emblem
  ci(cx-3.3*s,cy-5*s,.8*s,Wh);
  ci(cx-3.3*s,cy-5*s,.5*s,'#dd1122');
  // Arms
  const armRaise=a>.5?Math.sin(G.t*10)*1.5*s:0;
  px(cx-7*s,cy-2*s-armRaise,2.5*s,6*s,Sk);
  px(cx+5*s,cy-2*s+armRaise,2.5*s,6*s,Sk);
  // Fists (bigger when yelling)
  if(a>.5){
    px(cx-7.3*s,cy-2.5*s-armRaise,3*s,3*s,Sk);
    px(cx+4.7*s,cy-2.5*s+armRaise,3*s,3*s,Sk);
  }
  // Face
  if(a>.5){
    // Fierce V-shaped eyebrows
    px(cx-4.5*s,cy-3.7*s,2.8*s,1*s,Bk);
    px(cx-4*s,cy-3.3*s,2*s,.8*s,Bk);
    px(cx-3.5*s,cy-2.9*s,1.2*s,.6*s,Bk);
    px(cx+1.5*s,cy-3.7*s,2.8*s,1*s,Bk);
    px(cx+2*s,cy-3.3*s,2*s,.8*s,Bk);
    px(cx+2.5*s,cy-2.9*s,1.2*s,.6*s,Bk);
    // Blazing eyes
    px(cx-4*s,cy-2.2*s,2.5*s,2.2*s,Bk);
    px(cx+1.5*s,cy-2.2*s,2.5*s,2.2*s,Bk);
    px(cx-3.5*s,cy-1.8*s,1.5*s,1.5*s,'#ffff66');
    px(cx+2*s,cy-1.8*s,1.5*s,1.5*s,'#ffff66');
    px(cx-3*s,cy-1.4*s,.7*s,.7*s,Re);
    px(cx+2.5*s,cy-1.4*s,.7*s,.7*s,Re);
    // Yelling mouth (open wide)
    px(cx-3.5*s,cy+3*s,7*s,5*s,'#770000');
    px(cx-3*s,cy+3*s,6*s,1*s,Bk);
    // Teeth
    px(cx-2.8*s,cy+4*s,1.2*s,2.5*s,Wh);
    px(cx-.5*s,cy+4*s,1*s,2.5*s,Wh);
    px(cx+1.8*s,cy+4*s,1.2*s,2.5*s,Wh);
    // Flames around body (hot-blooded aura)
    for(let i=0;i<12;i++){
      const ft=Math.sin(G.t*12+i*1.5);
      const fx=cx-10*s+i*1.8*s;
      const fy=cy+9*s-ft*5*s;
      px(fx,fy,2*s,4*s+ft*3*s,['#ff2200','#ff6600','#ffaa00','#ffdd00'][i%4]);
    }
    // Extra flame on leaves (head on fire!)
    for(let i=0;i<5;i++){
      const ft=Math.sin(G.t*15+i)*2;
      px(cx-2*s+i*1*s,cy-16*s-ft*s,1.2*s,2*s+ft,['#ff4400','#ffaa00','#ffdd00'][i%3]);
    }
    // Anger vein
    const v=.5+Math.sin(G.t*10)*.3;X.globalAlpha=v;
    px(cx+4.5*s,cy-5.5*s,1.2*s,.4*s,Vn);
    px(cx+4.3*s,cy-5.2*s,.4*s,1.4*s,Vn);
    px(cx+5.3*s,cy-5.2*s,.4*s,1.4*s,Vn);
    X.globalAlpha=1;
  }else{
    // Calm eyes
    px(cx-3.5*s,cy-3.5*s,2.5*s,2.5*s,Bk);
    px(cx+1*s,cy-3.5*s,2.5*s,2.5*s,Bk);
    px(cx-3*s,cy-3*s,1*s,1*s,Wh);
    px(cx+1.5*s,cy-3*s,1*s,1*s,Wh);
    // Neutral mouth
    px(cx-2*s,cy+3*s,4*s,1.5*s,'#663300');
    // Subtle blush
    X.globalAlpha=.3;
    px(cx-4.5*s,cy+1*s,2*s,1.2*s,'#ff8866');
    px(cx+2.5*s,cy+1*s,2*s,1.2*s,'#ff8866');
    X.globalAlpha=1;
  }
}

// ═══════════════════════════════════════
// Character face/portrait — enhanced
// ═══════════════════════════════════════
function dF(cx,cy,s,ch,expr){
  const g=ch===1,cap=g?SG:SB,capO=g?SGO:SBO,capL=g?'#ff66bb':'#4488ee';
  // Subtle glow behind head
  if(expr==='godly'||expr==='proud'){
    X.globalAlpha=.2;ci(cx,cy,20*s,expr==='godly'?Au:'#aaccff');X.globalAlpha=1;
  }
  // Head outline
  px(cx-10.5*s,cy-12.5*s,21*s,25*s,SkO);
  // Face
  px(cx-10*s,cy-12*s,20*s,24*s,Sk);
  px(cx-9*s,cy-11*s,18*s,22*s,SkL);
  // Cap outline
  px(cx-11.5*s,cy-16.5*s,23*s,9*s,capO);
  // Cap main
  px(cx-11*s,cy-16*s,22*s,8*s,cap);
  // Cap highlight stripe
  px(cx-10*s,cy-15.5*s,20*s,1.2*s,capL);
  // Cap logo (北)
  X.globalAlpha=.8;T('北',cx,cy-12.5*s,3*s,Wh,'center');X.globalAlpha=1;
  // Hair (for female)
  if(g){
    px(cx-12*s,cy-12*s,4*s,14*s,'#553322');
    px(cx+8*s,cy-12*s,4*s,14*s,'#553322');
    px(cx-12.5*s,cy-11*s,1*s,10*s,'#442211');
    px(cx+11.5*s,cy-11*s,1*s,10*s,'#442211');
  }
  // Goggles outline
  px(cx-8.5*s,cy-8.5*s,8*s,4.5*s,'#222');
  px(cx+.5*s,cy-8.5*s,8*s,4.5*s,'#222');

// Swimmer (in-water) — same proportions, enhanced highlights
function dSw(cx,cy,ph,ch,st,sc){
  const s=sc*2.5,su=ch===1?SG:SB,suD=ch===1?SGD:SBD,sk=st<30?'#ffaaaa':Sk,ca=ch===1?SG:SB;
  const sN=8,sH=5.5*sc,ss=[];
  for(let i=0;i<sN;i++){
    const w2=Math.sin(ph-i*.5)*2.5*sc,d=Math.cos(ph-i*.5);
    let w;if(i===0)w=5*sc;else if(i===1)w=7*sc;else if(i<4)w=8*sc;else if(i<6)w=6*sc;else w=4*sc;
    w*=(.88+d*.12);ss.push({y:cy-sN*sH/2+i*sH+w2,w,d})
  }
  for(let i=5;i<sN;i++){const sg=ss[i];px(cx-sg.w*.4,sg.y,sg.w*.8,sH+1,sk)}
  for(let i=2;i<5;i++){const sg=ss[i];px(cx-sg.w/2,sg.y,sg.w,sH+1,sg.d>.2?su:suD)}
  const sh=ss[1];px(cx-sh.w/2-1.5*s,sh.y,sh.w+3*s,sH,sk);
  const ac=((ph*.5)%(Math.PI*2)+Math.PI*2)%(Math.PI*2),shY=ss[1].y+sH/2,shHW=sh.w/2+1.5*s;
  if(ac<Math.PI){
    const t=ac/Math.PI,sp=Math.sin(t*Math.PI)*32*sc;
    X.strokeStyle=sk;X.lineWidth=3*sc;
    X.beginPath();X.moveTo(cx-shHW,shY);X.quadraticCurveTo(cx-shHW-sp*.7,shY-t*15*sc,cx-shHW-sp,shY-t*24*sc+(1-t)*12*sc);X.stroke();
    X.beginPath();X.moveTo(cx+shHW,shY);X.quadraticCurveTo(cx+shHW+sp*.7,shY-t*15*sc,cx+shHW+sp,shY-t*24*sc+(1-t)*12*sc);X.stroke();
    // Splash arcs at hand
    if(t>.2&&t<.8){
      X.globalAlpha=.4;
      for(let i=0;i<3;i++){
        ci(cx-shHW-sp+Math.random()*3,shY-t*24*sc+Math.random()*4,1.5,GoH);
        ci(cx+shHW+sp+Math.random()*3,shY-t*24*sc+Math.random()*4,1.5,GoH);
      }
      X.globalAlpha=1;
    }
  }
  const hd=ss[0];
  px(cx-4.5*sc,hd.y-3*sc,9*sc,6*sc,ca);
  px(cx-4*sc,hd.y-2*sc,8*sc,7*sc,sk);
  // Cap highlight
  px(cx-4*sc,hd.y-2.5*sc,7*sc,1*sc,ch===1?'#ff66aa':'#66aaff');
}

// ════════════════════════════════════
//  4-LANE RHYTHM SYSTEM (pool-themed)
// ════════════════════════════════════
const LN=4;
function getLW(){return G.mobile?Math.floor((W-30)/4):90}
function getLGAP(){return G.mobile?2:8}
function getLX(i){const lw=getLW(),gap=getLGAP();const start=(W-LN*lw-(LN-1)*gap)/2;return start+i*(lw+gap)}
function getLY(){return G.mobile?60:55}
function getLH(){return G.mobile?H-140:440}
function getHitY(){return getLY()+getLH()-55}
const HIT_H2=55;
const LANE_NAMES=['左手','核心','足部','右手'];
const LANE_KEYS=['D','F','J','K'];
const LANE_COL=['#2244aa','#226688','#886622','#aa2244'];
const LANE_HI=['#4488ff','#44aacc','#ccaa44','#ff4488'];
const PERF_D=26,GOOD_D=52;

function spawnBlock(){
  let lane;
  if(G.diff===0)lane=[1,2,1,2,0,3][Math.floor(Math.random()*6)];
  else if(G.diff===1)lane=Math.floor(Math.random()*4);
  else{lane=Math.floor(Math.random()*4);
    if(Math.random()<.15){const l2=(lane+1+Math.floor(Math.random()*3))%4;
      G.blocks.push({lane:l2,y:-28,h:28,spd:G.blockSpd,hit:0,miss:0,glow:0});G.totN++;}}
  const isLong=Math.random()<.18+G.diff*.07;
  const h=isLong?(130+Math.random()*60):28;
  G.blocks.push({lane,y:-h,h,spd:G.blockSpd,hit:0,miss:0,glow:0});
}

function updateBlocks(dt){
  for(let ln=0;ln<LN;ln++){
    if(!laneHit[ln])continue;laneHit[ln]=0;
    let best=null,bestD=999;
    for(const b of G.blocks){
      if(b.lane!==ln||b.hit||b.miss)continue;
      const bBot=b.y+b.h;
      const dist=Math.abs(bBot-getHitY());
      if(dist<bestD&&bBot>getHitY()-GOOD_D&&b.y<getHitY()+HIT_H2){bestD=dist;best=b}
    }
    if(best){
      if(bestD<=PERF_D){best.hit=2;G.perf++;G.combo++;G.mxCombo=Math.max(G.mxCombo,G.combo);G.score+=300*(1+G.combo*.08);G.dist+=.7*G.spMul;sfx.perf();G.flType='P';G.flT=.3;G.flLane=ln;G.lf[ln]={t:.3,c:Au};G.shakeT=.05}
      else{best.hit=1;G.good++;G.combo++;G.mxCombo=Math.max(G.mxCombo,G.combo);G.score+=120;G.dist+=.35*G.spMul;sfx.good();G.flType='G';G.flT=.2;G.flLane=ln;G.lf[ln]={t:.2,c:Gn}}
    }else G.lf[ln]={t:.1,c:'#333'};
  }
  for(let i=G.blocks.length-1;i>=0;i--){
    const b=G.blocks[i];b.y+=b.spd*dt;
    if(b.hit){b.glow=(b.glow||.3)-.015;if(b.glow<=0)G.blocks.splice(i,1);continue}
    if(b.y>getHitY()+HIT_H2+20&&!b.miss){b.miss=1;G.miss++;G.combo=0;G.stam=Math.max(0,G.stam-3);sfx.miss();G.flType='M';G.flT=.3;G.flLane=b.lane;G.lf[b.lane]={t:.3,c:Re};G.shakeT=.15}
    if(b.y>H+60)G.blocks.splice(i,1);
  }
  for(let ln=0;ln<LN;ln++){if(G.lf[ln])G.lf[ln].t-=dt;if(G.lf[ln]?.t<=0)G.lf[ln]=null}
}

function drawLanes(){
  for(let ln=0;ln<LN;ln++){
    const lx=getLX(ln);
    // Lane water (darker, pool-tile feel)
    px(lx,getLY(),getLW(),getLH(),'rgba(5,20,45,.92)');
    // Subtle vertical lane water pattern
    for(let y=getLY();y<getLY()+getLH();y+=20){
      X.globalAlpha=.05+Math.sin(G.t+y*.02+ln)*.03;
      px(lx+3,y,getLW()-6,2,'#88ccff');
      X.globalAlpha=1;
    }
    // Lane borders (thicker, colored)
    px(lx,getLY(),3,getLH(),LANE_COL[ln]);
    px(lx+getLW()-3,getLY(),3,getLH(),LANE_COL[ln]);
    // Top/bottom border
    px(lx,getLY()-2,getLW(),2,LANE_COL[ln]);
    // Lane rope decoration (floating buoys between lanes)
    if(ln<LN-1){
      const rx=lx+getLW()+getLGAP()/2-2;
      for(let y=getLY()+10;y<getLY()+getLH();y+=18){
        const bob=Math.sin(G.t*2+y*.1)*1;
        px(rx,y+bob,4,4,['#ff2222','#fff','#2266cc'][Math.floor(y/18)%3]);
      }
    }
    // Hit zone
    const hf=G.lf[ln];
    px(lx,getHitY(),getLW(),HIT_H2,hf?hf.c:'#1a2a50');
    px(lx,getHitY(),getLW(),3,Wh);
    px(lx,getHitY()+HIT_H2-3,getLW(),3,Wh);
    // Lane color glow in hit zone
    X.globalAlpha=.2;
    px(lx+3,getHitY()+3,getLW()-6,HIT_H2-6,LANE_HI[ln]);
    X.globalAlpha=1;
    // Pulse on active
    if(hf?.t>0){X.globalAlpha=hf.t*2;px(lx,getHitY()-15,getLW(),HIT_H2+30,hf.c);X.globalAlpha=1}
    // Labels
    T(LANE_NAMES[ln],lx+getLW()/2,getLY()+12,12,LANE_HI[ln],'center');
    T(LANE_KEYS[ln],lx+getLW()/2,getLY()+getLH()+14,14,'#778','center');
    // Guide arrow/dots
    for(let gy=getLY()+30;gy<getHitY();gy+=35){
      X.globalAlpha=.08;px(lx+getLW()/2-1,gy,2,18,'#88aacc');X.globalAlpha=1;
    }
  }
  // Blocks (water-droplet style blocks)
  for(const b of G.blocks){
    const lx=getLX(b.lane);
    if(b.hit){
      X.globalAlpha=(b.glow||0)*2;
      px(lx+4,b.y-3,getLW()-8,b.h+6,b.hit===2?Au:Gn);
      // Sparkle shards
      for(let j=0;j<5;j++){

function drawSwimStyle(cx,cy,style,t,s){

  }else{
    px(cx-1.5*s,cy-6*s,3*s,3*s,'#ffe8cc');

  }

    const msgs=['耐力不夠...','一定是我努力不夠...','我要加強訓練...','突破自我！'];
    const totalChars=msgs.join('').length;
    const shown=Math.min(totalChars,(G.motT*10)|0);
    let charCount=0,drawY=180;
    for(const msg of msgs){
      const start=charCount,end=charCount+msg.length;
      if(shown>start){
        const vis=msg.substring(0,Math.min(msg.length,shown-start));
        const alpha=Math.min(1,(shown-start)/msg.length);
        X.globalAlpha=alpha;
        // Last message is bigger/brighter
        const isLast=msg==='突破自我！'&&vis===msg;
        if(isLast){
          const sh=Math.sin(G.t*20)*2;
          TB(vis,W/2+sh,drawY,32,Au,Bk,6);
        }else{
          TB(vis,W/2,drawY,26,Wh,Bk,4);
        }
        X.globalAlpha=1;
      }
      charCount=end;drawY+=50;
    }
    // Heartbeat pulse
    const pulse=Math.sin(G.t*4)*.5+.5;
    X.globalAlpha=pulse*.12;ci(W/2,H/2,100+pulse*50,Re);X.globalAlpha=1;
    // Swimmer face
    X.globalAlpha=.5+G.motT*.2;
    dF(W/2,H/2+80,4,G.ch,'determined');
    X.globalAlpha=1;
  }
  else if(G.motPh>=1){
    const reveal=Math.min(1,G.motT*1.5);
    X.globalAlpha=reveal;
    // Player in center with determined face
    dF(W/2,200,7,G.ch,'determined');
    // Speed lines with more energy
    for(let i=0;i<16;i++){
      const a=i/16*6.28+G.t*.3;
      X.strokeStyle=`rgba(255,215,0,${.1*reveal})`;
      X.lineWidth=5;X.beginPath();
      X.moveTo(W/2,200);X.lineTo(W/2+Math.cos(a)*450,200+Math.sin(a)*350);X.stroke();
    }
    // Fire ring around player
    for(let i=0;i<12;i++){
      const a=i/12*6.28+G.t;
      const r=80+Math.sin(G.t*3+i)*8;
      X.globalAlpha=reveal*.6;
      px(W/2+Math.cos(a)*r-3,200+Math.sin(a)*r-3,6,6,['#ff4400','#ffaa00','#ffdd00'][i%3]);
      X.globalAlpha=reveal;
    }
    // Player dialog
    const dbw=Math.min(400,W-40);
    bub(W/2-dbw/2,320,dbw,G.mobile?55:65,W/2,290,Go);
    const pMsg='我不會放棄！我要突破自己的極限！';
    const pShown=pMsg.substring(0,Math.min(pMsg.length,(G.motT*14)|0));
    TW(pShown,W/2-dbw/2+15,G.mobile?330:332,G.mobile?18:22,'#222',dbw-30);
    X.globalAlpha=1;
    if(G.motPh===2){
      const slideIn=Math.min(1,(G.motT)*3);
      const cs2=G.mobile?3.5:5;
      const sX=slideIn*80,pX2=W-slideIn*80;
      // Slide-in motion lines
      if(slideIn<1){
        X.globalAlpha=.3;
        for(let i=0;i<5;i++){
          X.strokeStyle='#dd0000';X.lineWidth=3;X.beginPath();
          X.moveTo(0,G.mobile?H-120+i*3:490+i*3);X.lineTo(sX,G.mobile?H-120+i*3:490+i*3);X.stroke();
          X.strokeStyle='#ffbb22';
          X.beginPath();X.moveTo(W,G.mobile?H-120+i*3:490+i*3);X.lineTo(pX2,G.mobile?H-120+i*3:490+i*3);X.stroke();
        }
        X.globalAlpha=1;
      }
      drawS(sX,G.mobile?H-120:490,cs2,0);
      const sb=Math.min(W/2-20,280);
      bub(sX+50,G.mobile?H-180:430,sb,50,sX+20,G.mobile?H-120:490,'#dd0000');
      const sMsg='相信自己，你可以做到！';
      T(sMsg.substring(0,Math.min(sMsg.length,(G.motT*12)|0)),sX+62,G.mobile?H-160:450,G.mobile?15:18,'#222');
      drawP(pX2,G.mobile?H-120:490,cs2,0);
      bub(pX2-sb-10,G.mobile?H-180:430,sb,50,pX2-10,G.mobile?H-120:490,'#ffbb22');
      const pMsg2='我們都在你身邊！衝吧！';
      T(pMsg2.substring(0,Math.min(pMsg2.length,(G.motT*12)|0)),pX2-sb,G.mobile?H-160:450,G.mobile?15:18,'#222');
      // Golden light burst
      if(G.motT>1){
        X.globalAlpha=Math.min(.2,(G.motT-1)*.1);
        px(0,0,W,H,Au);
        X.globalAlpha=1;
      }
    }
  }
  if(G.motWait&&Math.sin(G.t*3)>0)T('👆 我準備好了！',W/2,H-25,22,Au,'center');
}
function cMot(p){
  if(!G.motWait)return;
  sfx.pow();
  G.stam=40;
  G.willp=true;
  G.st=5;
  G.cMsg='⚡ 突破自我！全力以赴！';G.cMsgT=3;G.cMsgFrom=1;
  G.blocks=[];G.blockT=.5;
}

// ═══ STATE 11: GALLERY ═══
const galN=['✨完美裝備','🔭望遠鏡','🩲大災難','SS全中運','S霸主','A菁英','B進步','C努力','D練習','🍗大雞排','🥟生煎包','⚡意志力爆發'];
let galSel=-1;
function dGal(){
  if(galSel>=0){
    px(0,0,W,H,'#0a0a18');
    // Decorative background
    X.globalAlpha=.08;
    for(let i=0;i<16;i++){
      const a=i/16*6.28+G.t*.2;
      X.strokeStyle=Au;X.lineWidth=3;X.beginPath();
      X.moveTo(W/2,H/2);X.lineTo(W/2+Math.cos(a)*500,H/2+Math.sin(a)*400);X.stroke();
    }
    X.globalAlpha=1;
    const i=galSel;
    if(i<3)dF(W/2,280,10,G.ch,['happy','shock','lactic'][i]);
    else if(i<9){
      const g=['SS','S','A','B','C','D'][i-3];
      const exprs={SS:'godly',S:'proud',A:'determined',B:'normal',C:'lactic',D:'lactic'};
      dF(W/2,250,8,G.ch,exprs[g]);
      drawS(120,430,4,0);drawP(W-120,430,4,0);
    }
    else if(i===9)drawChicken(W/2,H/2,4);
    else if(i===10)drawBaozi(W/2,H/2,4);
    else{
      dF(W/2,280,8,G.ch,'determined');
      TB('⚡突破自我！',W/2,100,30,Au,Bk,5);
      drawS(120,480,4,0);drawP(W-120,480,4,0);
    }
    TB(galN[i],W/2,40,26,Au,Bk,5);
    px(10,10,110,40,'rgba(0,0,0,.8)');
    px(10,10,110,3,Au);
    T('← 返回',25,32,18,Au);
    return;
  }
  px(0,0,W,H,'#0a0a20');
  // Ambient bubbles
  for(let i=0;i<15;i++){
    const bx=(i*43+G.t*8)%W;
    const by=(H-((G.t*25+i*73)%(H+30)));
    X.globalAlpha=.2;
    ci(bx,by,2,'#aaddff');
    X.globalAlpha=1;
  }
  TB('🎬 動畫花絮',W/2,40,30,Au,Bk,5);
  T('點擊觀看所有事件和結局動畫',W/2,72,14,'#778','center');
  const cols=G.mobile?3:4,cw=G.mobile?130:175,ch2=55,ox=(W-cols*(cw+8))/2,oy=95;
  for(let i=0;i<galN.length;i++){
    const col=i%cols,row=Math.floor(i/cols);
    const bx=ox+col*(cw+8),by=oy+row*(ch2+8);
    const hov=G.mx>bx&&G.mx<bx+cw&&G.my>by&&G.my<by+ch2;
    if(hov){X.globalAlpha=.2;px(bx-2,by-2,cw+4,ch2+4,Au);X.globalAlpha=1;}
    px(bx,by,cw,ch2,hov?'#334455':'#1a2233');
    px(bx,by,cw,3,Au);
    px(bx,by+ch2-3,cw,3,Au);
    T(galN[i],bx+8,by+ch2/2,14,Wh);
  }
  px(10,H-50,130,40,'rgba(0,0,0,.7)');
  px(10,H-50,130,3,Au);
  T('← 回標題',25,H-28,18,Au);
}
function cGal(p){
  if(galSel>=0){if(p.x<120&&p.y<50){galSel=-1;sfx.click()}return}
  const cols=G.mobile?3:4,cw=G.mobile?130:175,ch2=55,ox=(W-cols*(cw+8))/2,oy=95;
  for(let i=0;i<galN.length;i++){
    const col=i%cols,row=Math.floor(i/cols);
    const bx=ox+col*(cw+8),by=oy+row*(ch2+8);
    if(p.x>bx&&p.x<bx+cw&&p.y>by&&p.y<by+ch2){galSel=i;G.t=0;sfx.click();return}
  }
  if(p.x<140&&p.y>H-50){G.st=0;sfx.click()}
}

// LOOP
const upd=[null,null,null,uEq,uCD,uSw,uCu,uMn,uMR,uRes,uMot,null];
const drw=[dT,dI,dCS,dEq,dCD,dSWIM,dCu,dMn,dMR,dRes,dMot,dGal];
const clk=[cT,cI,cCS,cEq,null,cSw,cCu,cMn,cMR,cRes,cMot,cGal];
function loop(ts){
  const dt=Math.min(.05,(ts-lastTS)/1000);lastTS=ts;G.dt=dt;G.t+=dt;G.fr++;
  while(clicks.length){const p=clicks.shift();clk[G.st]?.(p)}
  upd[G.st]?.(dt);
  X.clearRect(0,0,W,H);
  drw[G.st]?.();
  laneHit=[0,0,0,0];
  requestAnimationFrame(loop);
}
lastTS=performance.now();requestAnimationFrame(loop);
</script>
