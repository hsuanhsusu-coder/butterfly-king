<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>北小泳隊：蝶王特訓 🦋</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'DotGothic16',monospace;image-rendering:pixelated;user-select:none;touch-action:manipulation;display:flex;align-items:center;justify-content:center;height:100dvh;width:100vw}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;cursor:pointer}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<script>
const C=document.getElementById('gc'),X=C.getContext('2d');
let W=800,H=600,SC=1;
function resize(){SC=Math.min(innerWidth/W,innerHeight/H);C.width=W;C.height=H;C.style.width=(W*SC)+'px';C.style.height=(H*SC)+'px';X.imageSmoothingEnabled=false}
resize();addEventListener('resize',resize);

// ══ AUDIO ══
let AC=null;function iA(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)()}
function bp(f,d,v=.1,t='square'){if(!AC)return;try{const o=AC.createOscillator(),g=AC.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d)}catch(e){}}
const sfx={perf(){bp(880,.08);setTimeout(()=>bp(1320,.06,.08),50)},good(){bp(660,.08,.08)},miss(){bp(180,.2,.1,'sawtooth')},click(){bp(500,.04,.06)},boom(){bp(80,.3,.12,'sawtooth')},pow(){bp(440,.1,.08);setTimeout(()=>bp(660,.1,.08),80);setTimeout(()=>bp(880,.15,.1),160)},go(){bp(880,.2,.12)},ding(){bp(1200,.12,.1);bp(1500,.08,.06)},rip(){bp(100,.3,.1,'sawtooth');bp(80,.2,.08,'sawtooth')},romantic(){bp(330,.3,.06,'sine');setTimeout(()=>bp(392,.3,.06,'sine'),200)},chomp(){bp(300,.06,.08);bp(400,.04,.06)},ouch(){bp(100,.15,.12,'sawtooth')}};

// ══ INPUT ══
let clicks=[],keys={},tL=false,tR=false;
function cp(e){const r=C.getBoundingClientRect();return{x:((e.clientX??(e.touches?.[0]?.clientX??0))-r.left)/SC,y:((e.clientY??(e.touches?.[0]?.clientY??0))-r.top)/SC}}
C.addEventListener('pointerdown',e=>{iA();const p=cp(e);clicks.push(p);if(G.st===7){if(p.x<130&&p.y>H-170)tL=true;else if(p.x>W-130&&p.y>H-170)tR=true}});
C.addEventListener('pointerup',()=>{tL=tR=false});
C.addEventListener('pointermove',e=>{const p=cp(e);G.mx=p.x;G.my=p.y});
addEventListener('keydown',e=>{keys[e.key]=true});addEventListener('keyup',e=>{keys[e.key]=false});

// ══ DRAW ══
function px(x,y,w,h,c){X.fillStyle=c;X.fillRect(x|0,y|0,Math.ceil(w),Math.ceil(h))}
function ci(x,y,r,c){X.fillStyle=c;X.beginPath();X.arc(x,y,r,0,6.3);X.fill()}
function ri(x,y,r,c,l=2){X.strokeStyle=c;X.lineWidth=l;X.beginPath();X.arc(x,y,r,0,6.3);X.stroke()}
function T(s,x,y,z,c,a='left'){X.font=`bold ${z}px "DotGothic16"`;X.fillStyle=c;X.textAlign=a;X.textBaseline='middle';X.fillText(s,x|0,y|0)}
function TB(s,x,y,z,c,s2='#000',l=5){X.font=`bold ${z}px "DotGothic16"`;X.textAlign='center';X.textBaseline='middle';X.strokeStyle=s2;X.lineWidth=l;X.strokeText(s,x|0,y|0);X.fillStyle=c;X.fillText(s,x|0,y|0)}
function TW(s,x,y,z,c,mw){X.font=`bold ${z}px "DotGothic16"`;X.fillStyle=c;X.textAlign='left';X.textBaseline='top';let ln='',ly=y;for(let i=0;i<s.length;i++){const t=ln+s[i];if(X.measureText(t).width>mw&&ln){X.fillText(ln,x|0,ly|0);ly+=z+6;ln=s[i]}else ln=t}if(ln)X.fillText(ln,x|0,ly|0)}
function bub(x,y,w,h,px2,py2,bc){px(x,y,w,h,'#fff');px(x,y,w,4,bc);px(x,y+h-4,w,4,bc);px(x,y,4,h,bc);px(x+w-4,y,4,h,bc);X.fillStyle='#fff';X.beginPath();if(py2<y){X.moveTo(px2-14,y);X.lineTo(px2,py2);X.lineTo(px2+14,y)}else{X.moveTo(px2-14,y+h);X.lineTo(px2,py2);X.lineTo(px2+14,y+h)}X.fill()}
const Au='#ffd700',Re='#ff2222',Gn='#33ee55',Wh='#fff',Bk='#111',Go='#44ddff',GoH='#aaffff',Or='#ff8800',Sk='#ffcc88',SkD='#dda866',SkL='#ffe8cc',Vn='#ff0044',SB='#2255cc',SG='#dd2288';

// ══ COACHES ══
function drawSarsi(cx,cy,s,ang){px(cx-5*s,cy-7*s,10*s,18*s,'#662200');px(cx-4.5*s,cy-6*s,9*s,16*s,'#551100');px(cx-3*s,cy-5*s,2*s,12*s,'#773311');px(cx-2.5*s,cy-10*s,5*s,4*s,'#552200');px(cx-3*s,cy-13*s,6*s,4*s,'#dd0000');px(cx-2*s,cy-14*s,4*s,2*s,Re);px(cx-5*s,cy-1*s,10*s,6*s,'#ffeecc');T('沙士',cx,cy+1.5*s,3.5*s,'#cc3300','center');const fl=ang>.7&&G.fr%20<8;px(cx-4*s,cy-6.5*s,3.5*s,3*s,'#223');px(cx+.5*s,cy-6.5*s,3.5*s,3*s,'#223');px(cx-3.5*s,cy-6*s,2.5*s,2*s,fl?Wh:'#88bbee');px(cx+1*s,cy-6*s,2.5*s,2*s,fl?Wh:'#88bbee');px(cx-.5*s,cy-5.5*s,1*s,1*s,'#555');px(cx-6.5*s,cy-3*s,2*s,6*s,Sk);px(cx+4.5*s,cy-3*s,2*s,6*s,Sk);if(ang>.3){px(cx-4*s,cy-8*s,3.5*s,1.5*s,Bk);px(cx+.5*s,cy-8*s,3.5*s,1.5*s,Bk)}if(ang>.6){px(cx-2.5*s,cy-3.5*s,5*s,2.5*s,Bk);px(cx-2*s,cy-3.5*s,4*s,1*s,Wh)}else px(cx-2*s,cy-3*s,4*s,1*s,'#ccc');if(ang>.4){const v=.5+Math.sin(G.t*10)*.3;X.globalAlpha=v;px(cx+3*s,cy-11.5*s,2*s,2*s,Vn);px(cx+4*s,cy-12*s,1.5*s,3*s,Vn);px(cx+2.5*s,cy-11*s,2.5*s,1.5*s,Vn);X.globalAlpha=1}}
// Sarsi broken glasses version
function drawSarsiBroken(cx,cy,s){drawSarsi(cx,cy,s,0);
  // Cracked glasses
  X.strokeStyle='#fff';X.lineWidth=1.5;X.beginPath();X.moveTo(cx-3*s,cy-7*s);X.lineTo(cx-1*s,cy-5*s);X.moveTo(cx-2*s,cy-7.5*s);X.lineTo(cx-3.5*s,cy-5.5*s);X.stroke();
  // Facepalm hand
  px(cx-4*s,cy-5*s,8*s,3*s,Sk);
  // Blank dot eyes behind hand
  px(cx-2*s,cy-6*s,1*s,1*s,Bk);px(cx+1.5*s,cy-6*s,1*s,1*s,Bk);
  // Sweat
  if(G.fr%20<12){px(cx+5*s,cy-9*s,2*s,3*s,'#44aaff')}
}
function drawPine(cx,cy,s,ang){px(cx-5*s,cy-5*s,10*s,14*s,'#cc8800');px(cx-4.5*s,cy-4.5*s,9*s,13*s,'#ffbb22');for(let r=0;r<5;r++)for(let c=0;c<4;c++)px(cx-4*s+c*2.5*s+(r%2)*1.2*s,cy-4*s+r*2.8*s,1.5*s,1.5*s,'#996600');px(cx-1.5*s,cy-12*s,3*s,8*s,'#33aa33');px(cx-4*s,cy-10*s,2.5*s,6*s,'#55cc44');px(cx+2*s,cy-10*s,2.5*s,6*s,'#55cc44');px(cx-5.5*s,cy-8*s,2*s,4*s,'#228822');px(cx+4*s,cy-8*s,2*s,4*s,'#228822');px(cx-7*s,cy-2*s,2.5*s,6*s,Sk);px(cx+5*s,cy-2*s,2.5*s,6*s,Sk);if(ang>.5){px(cx-4.5*s,cy-5*s,3.5*s,1.5*s,Bk);px(cx+1.5*s,cy-4.5*s,3.5*s,1.5*s,Bk);px(cx-4*s,cy-3.5*s,3*s,2.5*s,Bk);px(cx+1.5*s,cy-3.5*s,3*s,2.5*s,Bk);px(cx-3.5*s,cy+3*s,7*s,5*s,'#cc0000');px(cx-3*s,cy+3.3*s,6*s,1.2*s,Wh);px(cx-3*s,cy+7*s,6*s,1.2*s,Wh);for(let i=0;i<8;i++){const ft=Math.sin(G.t*12+i*1.5);px(cx-8*s+i*2.2*s,cy+9*s-ft*5*s,2*s,4*s+ft*3*s,['#ff3300','#ff8800','#ffcc00'][i%3])}}else{px(cx-3.5*s,cy-3.5*s,2.5*s,2.5*s,'#333');px(cx+1.5*s,cy-3.5*s,2.5*s,2.5*s,'#333');px(cx-2*s,cy+3*s,4*s,1.5*s,'#555')}}
// Pineapple exploding head version
function drawPineExplode(cx,cy,s){drawPine(cx,cy,s,1);
  // Head leaves on FIRE
  for(let i=0;i<12;i++){const fx=cx-6*s+i*s,ft=Math.sin(G.t*15+i*2),fy=cy-12*s-ft*6*s-Math.abs(Math.sin(G.t*8+i))*4*s;
    px(fx,fy,2*s,5*s+ft*3*s,['#ff2200','#ff6600','#ffaa00','#ffdd00'][i%4])}
}

// ══ FACE ══
function drawFace(cx,cy,s,ch,expr){
  const g=ch===1,cap=g?'#ff66aa':'#3388ff',capD=g?'#cc3388':'#2266aa';
  px(cx-10*s,cy-12*s,20*s,24*s,Sk);px(cx-9*s,cy-11*s,18*s,22*s,SkL);
  px(cx-11*s,cy-16*s,22*s,8*s,cap);px(cx-10*s,cy-15*s,20*s,5*s,capD);
  if(g){px(cx-12*s,cy-12*s,4*s,14*s,'#553322');px(cx+8*s,cy-12*s,4*s,14*s,'#553322')}
  const ex=cx-6*s,ey=cy-1*s;

  if(expr==='cool'){
    // Sunglasses push-down, smirk
    px(cx-8*s,cy-5*s,16*s,4*s,Bk);px(cx-7*s,cy-4.5*s,6*s,3*s,'#223');px(cx+1*s,cy-4.5*s,6*s,3*s,'#223');
    // Glint
    if(G.fr%15<8){px(cx+6*s,cy-6*s,2*s,1*s,Wh);px(cx+7*s,cy-5*s,1*s,2*s,Wh)}
    px(cx-3*s,cy+5*s,6*s,2*s,'#cc8866');// smirk
    px(cx+1*s,cy+4.5*s,2*s,1.5*s,Wh);
    // Sparkle aura
    for(let i=0;i<6;i++){const a=i/6*6.28+G.t*2;px(cx+Math.cos(a)*14*s,cy+Math.sin(a)*12*s,2*s,2*s,Au)}
  }
  else if(expr==='telescope'){
    // Wearing telescope tubes on eyes! Hilarious!
    px(cx-8*s,cy-8*s,7*s,4*s,Go);px(cx+1*s,cy-8*s,7*s,4*s,Go);px(cx-1*s,cy-7*s,2*s,2*s,'#556');
    // Long telescope tubes extending forward
    px(cx-6*s,cy-12*s,4*s,6*s,'#667788');px(cx+2*s,cy-12*s,4*s,6*s,'#667788');
    // Lens caps (big circles)
    ci(cx-4*s,cy-14*s,3*s,'#445566');ci(cx+4*s,cy-14*s,3*s,'#445566');
    ci(cx-4*s,cy-14*s,2*s,'#88bbdd');ci(cx+4*s,cy-14*s,2*s,'#88bbdd');
    // Gleam on lens
    if(G.fr%20<10){px(cx-5*s,cy-15*s,1.5*s,1.5*s,Wh);px(cx+3*s,cy-15*s,1.5*s,1.5*s,Wh)}
    // Confused mouth
    px(cx-2*s,cy+5*s,4*s,2*s,'#cc8866');
    // Question marks
    T('?',cx+9*s,cy-10*s,6*s,Au);T('?',cx-10*s,cy-8*s,5*s,Au);
  }
  else if(expr==='underwear'){
    // PANIC FACE - beet red, shaking
    X.globalAlpha=.3;px(cx-10*s,cy-12*s,20*s,24*s,'#ff4444');X.globalAlpha=1;
    // Wide shock eyes
    px(ex+s,ey-3*s,5*s,5*s,Wh);px(ex+8*s,ey-3*s,5*s,5*s,Wh);
    px(ex+2.5*s,ey-1.5*s,1.5*s,1.5*s,Bk);px(ex+9.5*s,ey-1.5*s,1.5*s,1.5*s,Bk);
    // Wavy screaming mouth
    px(cx-4*s,cy+4*s,8*s,5*s,'#cc3333');px(cx-3*s,cy+5*s,6*s,3*s,'#880000');
    // MASSIVE sweat waterfall
    for(let i=0;i<6;i++){const sy=cy-8*s+Math.sin(G.t*10+i)*2*s;
      px(cx-11*s+i*4.5*s,sy,2*s,4*s,'#44aaff')}
    // Shake effect
    const sh=Math.sin(G.t*30)*3;
    X.save();X.translate(sh,0);
    // Sunset red glow
    X.globalAlpha=.2+Math.sin(G.t*4)*.1;px(cx-12*s,cy-16*s,24*s,32*s,'#ff6644');X.globalAlpha=1;
    X.restore();
  }
  else if(expr==='happy'){px(ex,ey-s,5*s,1.5*s,Bk);px(ex+.5*s,ey-3*s,4*s,1.5*s,Bk);px(ex+8*s,ey-s,5*s,1.5*s,Bk);px(ex+8.5*s,ey-3*s,4*s,1.5*s,Bk);px(cx-4*s,cy+5*s,8*s,2*s,'#cc8866');px(cx-3*s,cy+7*s,6*s,2*s,Wh);X.globalAlpha=.35;px(cx-9*s,cy+3*s,5*s,3*s,'#ff8888');px(cx+4*s,cy+3*s,5*s,3*s,'#ff8888');X.globalAlpha=1;if(G.fr%20<12){px(cx-11*s,cy-7*s,2*s,5*s,Au);px(cx-12*s,cy-5*s,4*s,2*s,Au)}}
  else if(expr==='determined'){px(ex-s,ey-5*s,6*s,2*s,Bk);px(ex+7*s,ey-4*s,6*s,2*s,Bk);px(ex+s,ey-2*s,5*s,4*s,Wh);px(ex+8*s,ey-2*s,5*s,4*s,Wh);px(ex+2.5*s,ey-s,2.5*s,3*s,Bk);px(ex+9.5*s,ey-s,2.5*s,3*s,Bk);px(cx-3.5*s,cy+5*s,7*s,3*s,Wh);for(let i=0;i<3;i++)px(cx-2.5*s+i*2.5*s,cy+5.5*s,1*s,2*s,Bk);if(G.fr%4<3)for(let i=0;i<6;i++)px(cx-10*s+i*4*s,cy-10*s-Math.sin(G.t*10+i)*3*s,2.5*s,4*s,i%2?'#ff4400':'#ffaa00')}
  else if(expr==='lactic'){TB('×',ex+3*s,ey,4*s,Re,Bk,2);TB('×',ex+10*s,ey,4*s,Re,Bk,2);px(cx-3.5*s,cy+4*s,7*s,5*s,'#cc3333');px(cx-2*s,cy+7*s,5*s,3*s,'#ff7777');if(G.fr%30<18)px(cx+9*s,cy-5*s,2.5*s,4*s,'#44aaff');X.globalAlpha=.2;px(cx-8*s,cy-2*s,16*s,6*s,'#ff3333');X.globalAlpha=1;if(G.fr%50<25){X.globalAlpha=.3;T('魂',cx+6*s,cy-12*s-Math.sin(G.t*3)*3*s,5*s,'#aaf');X.globalAlpha=1}}
  else if(expr==='shock'){px(ex+s,ey-3*s,5*s,5*s,Wh);px(ex+8*s,ey-3*s,5*s,5*s,Wh);px(ex+2.5*s,ey-s,2*s,2*s,Bk);px(ex+9.5*s,ey-s,2*s,2*s,Bk);ci(cx,cy+6*s,3.5*s,'#cc3333');ci(cx,cy+6*s,2*s,'#880000');px(cx+10*s,cy-5*s,3*s,6*s,'#44aaff')}
  else if(expr==='proud'){px(ex+s,ey-2*s,5*s,4*s,Wh);px(ex+8*s,ey-2*s,5*s,4*s,Wh);px(ex+2*s,ey-s,2.5*s,3*s,'#2244cc');px(ex+9*s,ey-s,2.5*s,3*s,'#2244cc');px(cx-4*s,cy+4*s,8*s,3*s,'#cc8866');px(cx-3*s,cy+5*s,6*s,2.5*s,Wh)}
  else if(expr==='godly'){px(ex+s,ey-2*s,5*s,4*s,Au);px(ex+8*s,ey-2*s,5*s,4*s,Au);px(ex+2.5*s,ey-s,2.5*s,3*s,Wh);px(ex+9.5*s,ey-s,2.5*s,3*s,Wh);px(cx-4*s,cy+4*s,8*s,3*s,'#cc8866');X.globalAlpha=.35;px(cx-9*s,cy+2*s,5*s,3*s,'#ff8888');px(cx+4*s,cy+2*s,5*s,3*s,'#ff8888');X.globalAlpha=1}
  else{px(ex+s,ey-2*s,4*s,4*s,Wh);px(ex+8*s,ey-2*s,4*s,4*s,Wh);px(ex+2*s,ey-s,2*s,2.5*s,Bk);px(ex+9*s,ey-s,2*s,2.5*s,Bk);px(cx-2.5*s,cy+5*s,5*s,1.5*s,'#cc8866')}
}

// ══ Standing swimmer (side view for equip scene) ══
function drawStanding(cx,cy,s,ch,gear){
  const g=ch===1,su=g?SG:SB,cap=g?'#ff66aa':'#3388ff';
  // Legs
  px(cx-3*s,cy+8*s,3*s,14*s,Sk);px(cx+1*s,cy+8*s,3*s,14*s,Sk);
  // Feet
  px(cx-4*s,cy+21*s,4*s,2*s,SkD);px(cx,cy+21*s,4*s,2*s,SkD);
  // Body
  if(gear==='underwear'){
    // UNDERWEAR with flower pattern!
    px(cx-4*s,cy+3*s,9*s,7*s,Wh);px(cx-3*s,cy+4*s,7*s,5*s,'#ffddee');
    // Flower pattern
    ci(cx-1*s,cy+6*s,1.5*s,'#ff88aa');ci(cx+2*s,cy+5*s,1*s,'#ff88aa');ci(cx,cy+8*s,1*s,'#ff88aa');
    // Elastic band
    px(cx-4*s,cy+3*s,9*s,1.5*s,'#ddd');
  }else{
    px(cx-4*s,cy-2*s,9*s,12*s,su);px(cx-3.5*s,cy-1*s,8*s,10*s,g?'#991166':'#1a3d99');
  }
  // Arms
  px(cx-6*s,cy-1*s,3*s,10*s,Sk);px(cx+4*s,cy-1*s,3*s,10*s,Sk);
  // Head
  px(cx-4*s,cy-10*s,9*s,10*s,Sk);
  px(cx-5*s,cy-14*s,11*s,6*s,cap);
  // Face based on gear
  if(gear==='perfect'){
    // Confident eyes + goggle push
    px(cx-3*s,cy-7*s,3*s,2.5*s,Go);px(cx+1*s,cy-7*s,3*s,2.5*s,Go);
    px(cx-2.5*s,cy-6.5*s,2*s,1.5*s,GoH);px(cx+1.5*s,cy-6.5*s,2*s,1.5*s,GoH);
    px(cx-1*s,cy-3*s,3*s,1*s,'#cc8866');// smirk
  }else if(gear==='telescope'){
    // Telescope tubes sticking out of face
    px(cx-3*s,cy-8*s,3*s,8*s,'#667788');px(cx+1*s,cy-8*s,3*s,8*s,'#667788');
    ci(cx-1.5*s,cy-17*s,2.5*s,'#88bbdd');ci(cx+2.5*s,cy-17*s,2.5*s,'#88bbdd');
    px(cx-1*s,cy-3*s,3*s,1.5*s,'#cc8866');
    T('?',cx+6*s,cy-12*s,5*s,Au);
  }else{
    // Underwear panic
    px(cx-3*s,cy-7*s,3*s,3*s,Wh);px(cx+1*s,cy-7*s,3*s,3*s,Wh);
    px(cx-2*s,cy-6*s,1.5*s,1.5*s,Bk);px(cx+2*s,cy-6*s,1.5*s,1.5*s,Bk);
    ci(cx+.5*s,cy-2*s,2*s,'#cc3333');// O mouth
    // Massive blush
    X.globalAlpha=.4;px(cx-5*s,cy-5*s,11*s,5*s,'#ff5555');X.globalAlpha=1;
    // Shake
    const sh=Math.sin(G.t*25)*2;px(cx-4*s+sh,cy-10*s,9*s,10*s,Sk);
  }
}
