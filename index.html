<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
*{margin:0;padding:0;box-sizing:border-box}

canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;cursor:pointer}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<script>
const C=document.getElementById('gc'),X=C.getContext('2d');
let W=800,H=600,SC=1;
function resize(){SC=Math.min(innerWidth/W,innerHeight/H);C.width=W;C.height=H;C.style.width=(W*SC)+'px';C.style.height=(H*SC)+'px';X.imageSmoothingEnabled=false}
resize();addEventListener('resize',resize);

// Audio
let AC=null;function iA(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)()}
function bp(f,d,v=.1,t='square'){if(!AC)return;try{const o=AC.createOscillator(),g=AC.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d)}catch(e){}}
const sfx={perf(){bp(880,.08);setTimeout(()=>bp(1320,.06,.08),50)},good(){bp(660,.08,.08)},miss(){bp(180,.25,.12,'sawtooth')},click(){bp(500,.04,.06)},boom(){bp(80,.3,.12,'sawtooth')},pow(){bp(440,.1,.08);setTimeout(()=>bp(660,.1,.08),80);setTimeout(()=>bp(880,.15,.1),160)},go(){bp(880,.2,.12)},ding(){bp(1200,.12,.1)},chomp(){bp(300,.06,.08)},ouch(){bp(100,.15,.12,'sawtooth')}};

// Input
let clicks=[],keys={},tL=false,tR=false,laneHit=[0,0,0,0];
function cp(e){const r=C.getBoundingClientRect();return{x:((e.clientX??(e.touches?.[0]?.clientX??0))-r.left)/SC,y:((e.clientY??(e.touches?.[0]?.clientY??0))-r.top)/SC}}
C.addEventListener('pointerdown',e=>{iA();const p=cp(e);clicks.push(p);
  if(G.st===5){// 4 lanes: divide screen into 4 vertical zones
    const zone=Math.floor(p.x/(W/4));laneHit[Math.min(3,zone)]=1;}
  if(G.st===7){if(p.x<130&&p.y>H-170)tL=true;else if(p.x>W-130&&p.y>H-170)tR=true}});
C.addEventListener('pointerup',()=>{tL=tR=false});
C.addEventListener('pointermove',e=>{const p=cp(e);G.mx=p.x;G.my=p.y});
addEventListener('keydown',e=>{keys[e.key]=true;
  if(G.st===5){if(e.key==='d'||e.key==='D')laneHit[0]=1;if(e.key==='f'||e.key==='F')laneHit[1]=1;
    if(e.key==='j'||e.key==='J')laneHit[2]=1;if(e.key==='k'||e.key==='K')laneHit[3]=1;}});
addEventListener('keyup',e=>keys[e.key]=false);

// Draw helpers
function px(x,y,w,h,c){X.fillStyle=c;X.fillRect(x|0,y|0,Math.ceil(w),Math.ceil(h))}
function ci(x,y,r,c){X.fillStyle=c;X.beginPath();X.arc(x,y,r,0,6.3);X.fill()}
function ri(x,y,r,c,l=2){X.strokeStyle=c;X.lineWidth=l;X.beginPath();X.arc(x,y,r,0,6.3);X.stroke()}
function T(s,x,y,z,c,a='left'){X.font=`bold ${z}px "DotGothic16"`;X.fillStyle=c;X.textAlign=a;X.textBaseline='middle';X.fillText(s,x|0,y|0)}
function TB(s,x,y,z,c,s2='#000',l=5){X.font=`bold ${z}px "DotGothic16"`;X.textAlign='center';X.textBaseline='middle';X.strokeStyle=s2;X.lineWidth=l;X.strokeText(s,x|0,y|0);X.fillStyle=c;X.fillText(s,x|0,y|0)}
function TW(s,x,y,z,c,mw){X.font=`bold ${z}px "DotGothic16"`;X.fillStyle=c;X.textAlign='left';X.textBaseline='top';let ln='',ly=y;for(let i=0;i<s.length;i++){const t=ln+s[i];if(X.measureText(t).width>mw&&ln){X.fillText(ln,x|0,ly|0);ly+=z+6;ln=s[i]}else ln=t}if(ln)X.fillText(ln,x|0,ly|0)}
function bub(x,y,w,h,px2,py2,bc){px(x,y,w,h,'#fff');px(x,y,w,4,bc);px(x,y+h-4,w,4,bc);px(x,y,4,h,bc);px(x+w-4,y,4,h,bc);X.fillStyle='#fff';X.beginPath();if(py2<y){X.moveTo(px2-14,y);X.lineTo(px2,py2);X.lineTo(px2+14,y)}else{X.moveTo(px2-14,y+h);X.lineTo(px2,py2);X.lineTo(px2+14,y+h)}X.fill()}
const Au='#ffd700',Re='#ff2222',Gn='#33ee55',Wh='#fff',Bk='#111',Go='#44ddff',GoH='#aaffff',Or='#ff8800',
  Sk='#ffcc88',SkD='#cc9960',SkL='#ffe8cc',SkO='#aa7744',SB='#2255cc',SBD='#1a3d99',SBO='#112266',
  SG='#dd2288',SGD='#aa1166',SGO='#771144',Vn='#ff0044';

// Coaches (compact)
function drawS(cx,cy,s,a){px(cx-5.5*s,cy-7.5*s,11*s,19*s,'#220800');px(cx-5*s,cy-7*s,10*s,18*s,'#551100');px(cx-4.5*s,cy-6*s,9*s,16*s,'#883311');px(cx-3*s,cy-5*s,2*s,12*s,'#aa5533');px(cx-3*s,cy-13*s,6*s,4*s,'#dd0000');px(cx-5*s,cy-1*s,10*s,6*s,'#ffeecc');T('沙士',cx,cy+1.5*s,3.5*s,'#cc3300','center');const fl=a>.7&&G.fr%20<8;px(cx-4.5*s,cy-7*s,4*s,3.5*s,Bk);px(cx+.5*s,cy-7*s,4*s,3.5*s,Bk);px(cx-4*s,cy-6.5*s,3*s,2.5*s,fl?'#ddeeff':'#4477aa');px(cx+1*s,cy-6.5*s,3*s,2.5*s,fl?'#ddeeff':'#4477aa');if(!fl){px(cx-2*s,cy-5*s,.8*s,.8*s,Wh);px(cx+2.5*s,cy-5*s,.8*s,.8*s,Wh)}px(cx-6.5*s,cy-3*s,2*s,6*s,Sk);px(cx+4.5*s,cy-3*s,2*s,6*s,Sk);if(a>.3){px(cx-4*s,cy-8.5*s,3.5*s,1.5*s,Bk);px(cx+.5*s,cy-8.5*s,3.5*s,1.5*s,Bk)}if(a>.6){px(cx-2.5*s,cy-3.5*s,5*s,2.5*s,Bk);px(cx-2*s,cy-3.5*s,4*s,1*s,Wh)}else px(cx-2*s,cy-3*s,4*s,1*s,'#ddbba8');if(a>.4){const v=.5+Math.sin(G.t*10)*.3;X.globalAlpha=v;px(cx+3*s,cy-11.5*s,2*s,2*s,Vn);X.globalAlpha=1}}
function drawP(cx,cy,s,a){px(cx-5.5*s,cy-5.5*s,11*s,15*s,'#553300');px(cx-5*s,cy-5*s,10*s,14*s,'#cc8800');px(cx-4.5*s,cy-4.5*s,9*s,13*s,'#ffbb22');px(cx-3*s,cy-4*s,2.5*s,10*s,'#ffdd66');for(let r=0;r<5;r++)for(let c=0;c<4;c++)px(cx-4*s+c*2.5*s+(r%2)*1.2*s,cy-4*s+r*2.8*s,1.5*s,1.5*s,'#996600');px(cx-1.5*s,cy-12*s,3*s,8*s,'#33aa33');px(cx-4*s,cy-10*s,2.5*s,6*s,'#55cc44');px(cx+2*s,cy-10*s,2.5*s,6*s,'#55cc44');px(cx-7*s,cy-2*s,2.5*s,6*s,Sk);px(cx+5*s,cy-2*s,2.5*s,6*s,Sk);if(a>.5){px(cx-4*s,cy-3.5*s,3*s,2.5*s,Bk);px(cx+1.5*s,cy-3.5*s,3*s,2.5*s,Bk);px(cx-3.5*s,cy+3*s,7*s,5*s,'#cc0000');for(let i=0;i<8;i++){const ft=Math.sin(G.t*12+i*1.5);px(cx-8*s+i*2.2*s,cy+9*s-ft*5*s,2*s,4*s+ft*3*s,['#ff3300','#ff8800','#ffcc00'][i%3])}}else{px(cx-3*s,cy-3.5*s,2.5*s,2.5*s,'#333');px(cx+1*s,cy-3.5*s,2.5*s,2.5*s,'#333');px(cx-2*s,cy+3*s,4*s,1.5*s,'#555')}}
// Face
function dF(cx,cy,s,ch,expr){const g=ch===1,cap=g?SG:SB,capO=g?SGO:SBO;px(cx-10.5*s,cy-12.5*s,21*s,25*s,SkO);px(cx-10*s,cy-12*s,20*s,24*s,Sk);px(cx-9*s,cy-11*s,18*s,22*s,SkL);px(cx-11.5*s,cy-16.5*s,23*s,9*s,capO);px(cx-11*s,cy-16*s,22*s,8*s,cap);if(g){px(cx-12*s,cy-12*s,4*s,14*s,'#553322');px(cx+8*s,cy-12*s,4*s,14*s,'#553322')}px(cx-8*s,cy-8*s,7*s,4*s,Go);px(cx+1*s,cy-8*s,7*s,4*s,Go);const ex=cx-6*s,ey=cy-1*s;
  if(expr==='happy'){px(ex,ey-s,5*s,1.5*s,Bk);px(ex+8*s,ey-s,5*s,1.5*s,Bk);px(cx-4*s,cy+5*s,8*s,2*s,SkD);px(cx-3*s,cy+7*s,6*s,2*s,Wh);X.globalAlpha=.35;px(cx-9*s,cy+3*s,5*s,3*s,'#ff8888');px(cx+4*s,cy+3*s,5*s,3*s,'#ff8888');X.globalAlpha=1;if(G.fr%20<12){px(cx-11*s,cy-7*s,2*s,5*s,Au);px(cx-12*s,cy-5*s,4*s,2*s,Au)}}
  else if(expr==='determined'){px(ex-s,ey-5*s,6*s,2*s,Bk);px(ex+7*s,ey-4*s,6*s,2*s,Bk);px(ex+s,ey-2*s,5*s,4*s,Wh);px(ex+8*s,ey-2*s,5*s,4*s,Wh);px(ex+2.5*s,ey-s,2.5*s,3*s,Bk);px(ex+9.5*s,ey-s,2.5*s,3*s,Bk);px(cx-3.5*s,cy+5*s,7*s,3*s,Wh);if(G.fr%4<3)for(let i=0;i<6;i++)px(cx-10*s+i*4*s,cy-10*s-Math.sin(G.t*10+i)*3*s,2.5*s,4*s,i%2?'#ff4400':'#ffaa00')}
  else if(expr==='lactic'){TB('×',ex+3*s,ey,4*s,Re,Bk,2);TB('×',ex+10*s,ey,4*s,Re,Bk,2);px(cx-3.5*s,cy+4*s,7*s,5*s,'#cc3333');if(G.fr%30<18)px(cx+9*s,cy-5*s,2.5*s,4*s,'#44aaff');if(G.fr%50<25){X.globalAlpha=.3;T('魂',cx+6*s,cy-12*s-Math.sin(G.t*3)*3*s,5*s,'#aaf');X.globalAlpha=1}}
  else if(expr==='proud'){px(ex+s,ey-2*s,5*s,4*s,Wh);px(ex+8*s,ey-2*s,5*s,4*s,Wh);px(ex+2*s,ey-s,2.5*s,3*s,'#2244cc');px(ex+9*s,ey-s,2.5*s,3*s,'#2244cc');px(cx-4*s,cy+4*s,8*s,3*s,SkD);px(cx-3*s,cy+5*s,6*s,2.5*s,Wh)}
  else if(expr==='godly'){X.globalAlpha=.25;ci(cx,cy,16*s,Au);X.globalAlpha=1;px(ex+s,ey-2*s,5*s,4*s,Au);px(ex+8*s,ey-2*s,5*s,4*s,Au);px(ex+2.5*s,ey-s,2.5*s,3*s,Wh);px(ex+9.5*s,ey-s,2.5*s,3*s,Wh);px(cx-4*s,cy+4*s,8*s,3*s,SkD)}
  else if(expr==='shock'){px(ex+s,ey-3*s,5*s,5*s,Wh);px(ex+8*s,ey-3*s,5*s,5*s,Wh);px(ex+2.5*s,ey-s,2*s,2*s,Bk);px(ex+9.5*s,ey-s,2*s,2*s,Bk);ci(cx,cy+6*s,3.5*s,'#cc3333')}
  else{px(ex+s,ey-2*s,4*s,4*s,Wh);px(ex+8*s,ey-2*s,4*s,4*s,Wh);px(ex+2*s,ey-s,2*s,2.5*s,Bk);px(ex+9*s,ey-s,2*s,2.5*s,Bk);px(cx-2.5*s,cy+5*s,5*s,1.5*s,SkD)}}
function drawChicken(cx,cy,s){px(cx-1*s,cy+10*s,2.5*s,8*s,'#886644');px(cx-7*s,cy-8*s,14*s,18*s,'#cc8800');px(cx-6*s,cy-7*s,12*s,16*s,'#ffaa22');px(cx-5*s,cy-7*s,8*s,3*s,'#ffdd66');T('師大夜市大雞排',cx,cy+22*s,18,Au,'center')}
function drawBaozi(cx,cy,s){for(let i=0;i<4;i++){const bx=cx-9*s+i*6.5*s,by=cy;px(bx-2*s,by-2*s,5*s,4*s,'#eedd99');px(bx-2*s,by+1.5*s,5*s,1.5*s,'#cc8833');if(G.fr%30<20){X.globalAlpha=.3;px(bx,by-4*s,1*s,2*s,Wh);X.globalAlpha=1}}T('科技大樓站生煎包',cx,cy+8*s,18,Au,'center')}
// Swimmer
function dSw(cx,cy,ph,ch,st,sc){const s=sc*2.5,su=ch===1?SG:SB,suD=ch===1?SGD:SBD,sk=st<30?'#ffaaaa':Sk,ca=ch===1?SG:SB;const sN=8,sH=5.5*sc,ss=[];for(let i=0;i<sN;i++){const w2=Math.sin(ph-i*.5)*2.5*sc,d=Math.cos(ph-i*.5);let w;if(i===0)w=5*sc;else if(i===1)w=7*sc;else if(i<4)w=8*sc;else if(i<6)w=6*sc;else w=4*sc;w*=(.88+d*.12);ss.push({y:cy-sN*sH/2+i*sH+w2,w,d})}for(let i=5;i<sN;i++){const sg=ss[i];px(cx-sg.w*.4,sg.y,sg.w*.8,sH+1,sk)}for(let i=2;i<5;i++){const sg=ss[i];px(cx-sg.w/2,sg.y,sg.w,sH+1,sg.d>.2?su:suD)}const sh=ss[1];px(cx-sh.w/2-1.5*s,sh.y,sh.w+3*s,sH,sk);const ac=((ph*.5)%(Math.PI*2)+Math.PI*2)%(Math.PI*2),shY=ss[1].y+sH/2,shHW=sh.w/2+1.5*s;if(ac<Math.PI){const t=ac/Math.PI,sp=Math.sin(t*Math.PI)*32*sc;X.strokeStyle=sk;X.lineWidth=3*sc;X.beginPath();X.moveTo(cx-shHW,shY);X.quadraticCurveTo(cx-shHW-sp*.7,shY-t*15*sc,cx-shHW-sp,shY-t*24*sc+(1-t)*12*sc);X.stroke();X.beginPath();X.moveTo(cx+shHW,shY);X.quadraticCurveTo(cx+shHW+sp*.7,shY-t*15*sc,cx+shHW+sp,shY-t*24*sc+(1-t)*12*sc);X.stroke()}const hd=ss[0];px(cx-4.5*sc,hd.y-3*sc,9*sc,6*sc,ca);px(cx-4*sc,hd.y-2*sc,8*sc,7*sc,sk)}
function bgPool(){for(let y=0;y<H;y+=4)px(0,y,W,4,`rgb(${14+(y/H)*8|0},${34+(y/H)*18|0},${64+(y/H)*28|0})`)}
function bgSchool(){for(let y=0;y<250;y+=4)px(0,y,W,4,`rgb(${100+y/4|0},${150+y/5|0},220)`);px(0,420,W,180,'#889977');px(80,130,640,290,'#ddccaa');px(W/2-80,210,160,210,'#887744');px(W/2-55,235,110,35,Wh);T('臺北市北小',W/2,256,16,'#333','center')}

// ════════════════════════════════════
//  4-LANE RHYTHM SYSTEM
// ════════════════════════════════════
const LN=4;
function getLW(){return G.mobile?90:90}
function getLGAP(){return G.mobile?4:8}
function getLX(i){const lw=getLW(),gap=getLGAP();const start=(W-LN*lw-(LN-1)*gap)/2;return start+i*(lw+gap)}
function getLY(){return G.mobile?80:55}
function getLH(){return G.mobile?550:440}
function getHitY(){return getLY()+getLH()-50}
const HIT_H2=50;
const LANE_NAMES=['左手','核心','足部','右手'];
const LANE_KEYS=['D','F','J','K'];
const LANE_COL=['#2244aa','#226688','#886622','#aa2244'];
const LANE_HI=['#4488ff','#44aacc','#ccaa44','#ff4488'];
const PERF_D=26,GOOD_D=52;// wider for better feel

function spawnBlock(){
  let lane;
  if(G.diff===0)lane=[1,2,1,2,0,3][Math.floor(Math.random()*6)];
  else if(G.diff===1)lane=Math.floor(Math.random()*4);
  else{lane=Math.floor(Math.random()*4);
    if(Math.random()<.15){const l2=(lane+1+Math.floor(Math.random()*3))%4;
      G.blocks.push({lane:l2,y:-28,h:28,spd:G.blockSpd,hit:0,miss:0,glow:0});G.totN++;}}
  // SHORT=28 (quick tap) vs LONG=130-190 (very obvious)
  const isLong=Math.random()<.18+G.diff*.07;
  const h=isLong?(130+Math.random()*60):28;
  G.blocks.push({lane,y:-h,h,spd:G.blockSpd,hit:0,miss:0,glow:0});
}

function updateBlocks(dt){
  for(let ln=0;ln<LN;ln++){
    if(!laneHit[ln])continue;laneHit[ln]=0;
    let best=null,bestD=999;
    for(const b of G.blocks){
      if(b.lane!==ln||b.hit||b.miss)continue;
      const bBot=b.y+b.h;
      const dist=Math.abs(bBot-getHitY());
      if(dist<bestD&&bBot>getHitY()-GOOD_D&&b.y<getHitY()+HIT_H2){bestD=dist;best=b}
    }
    if(best){
      if(bestD<=PERF_D){best.hit=2;G.perf++;G.combo++;G.mxCombo=Math.max(G.mxCombo,G.combo);G.score+=300*(1+G.combo*.08);G.dist+=.7*G.spMul;sfx.perf();G.flType='P';G.flT=.3;G.flLane=ln;G.lf[ln]={t:.3,c:Au}}
      else{best.hit=1;G.good++;G.combo++;G.mxCombo=Math.max(G.mxCombo,G.combo);G.score+=120;G.dist+=.35*G.spMul;sfx.good();G.flType='G';G.flT=.2;G.flLane=ln;G.lf[ln]={t:.2,c:Gn}}
    }else G.lf[ln]={t:.1,c:'#333'};
  }
  for(let i=G.blocks.length-1;i>=0;i--){
    const b=G.blocks[i];b.y+=b.spd*dt;
    if(b.hit){b.glow=(b.glow||.3)-.015;if(b.glow<=0)G.blocks.splice(i,1);continue}
    if(b.y>getHitY()+HIT_H2+20&&!b.miss){b.miss=1;G.miss++;G.combo=0;G.stam=Math.max(0,G.stam-3);sfx.miss();G.flType='M';G.flT=.3;G.flLane=b.lane;G.lf[b.lane]={t:.3,c:Re};G.shakeT=.15}
    if(b.y>H+60)G.blocks.splice(i,1);
  }
  for(let ln=0;ln<LN;ln++){if(G.lf[ln])G.lf[ln].t-=dt;if(G.lf[ln]?.t<=0)G.lf[ln]=null}
}

function drawLanes(){
  for(let ln=0;ln<LN;ln++){
    const lx=getLX(ln);
    px(lx,getLY(),getLW(),getLH(),'rgba(10,20,40,.88)');
    px(lx,getLY(),2,getLH(),LANE_COL[ln]);px(lx+getLW()-2,getLY(),2,getLH(),LANE_COL[ln]);
    // Hit zone
    const hf=G.lf[ln];
    px(lx,getHitY(),getLW(),HIT_H2,hf?hf.c:LANE_COL[ln]);
    px(lx,getHitY(),getLW(),3,Wh);px(lx,getHitY()+HIT_H2-3,getLW(),3,Wh);
    if(hf?.t>0){X.globalAlpha=hf.t*2;px(lx,getHitY()-15,getLW(),HIT_H2+30,hf.c);X.globalAlpha=1}
    // Labels
    T(LANE_NAMES[ln],lx+getLW()/2,getLY()+12,12,LANE_HI[ln],'center');
    T(LANE_KEYS[ln],lx+getLW()/2,getLY()+getLH()+14,14,'#556','center');
    // Guide dots
    for(let gy=getLY()+30;gy<getHitY();gy+=35){X.globalAlpha=.06;px(lx+getLW()/2-1,gy,2,18,'#88aacc');X.globalAlpha=1}
  }
  // Blocks
  for(const b of G.blocks){
    const lx=getLX(b.lane);
    if(b.hit){X.globalAlpha=(b.glow||0)*2;px(lx+4,b.y-3,getLW()-8,b.h+6,b.hit===2?Au:Gn);for(let j=0;j<3;j++)px(lx+8+Math.random()*(getLW()-16),b.y+Math.random()*b.h,4,4,Wh);X.globalAlpha=1}

    else{drawSunset(180);drawWater(280,H-280,true);for(let i=0;i<5;i++){X.strokeStyle='rgba(100,180,255,.1)';X.lineWidth=1;X.beginPath();X.moveTo(150+i*120,280);X.lineTo(150+i*120,H);X.stroke()}dF(W/2-80,250,5,G.ch,'normal');px(W/2-55,235,30,6,'#667788');ci(W/2-35,238,5,'#88bbdd');ci(W/2-35,238,3,Wh);drawS(W-120,260,2.5,0);drawP(W-80,260,2.5,0);drawNarr('特訓的第一課：責任感。');G.dlgExpr='determined';drawDlg('選手','我會負責把同學盯緊的～教練...',H-80,G.ch)}}
  T(`第${P+1}頁/3`,W/2,H-15,14,'#556','center');
  if(G.resReady&&Math.sin(G.t*4)>0)T(P<2?'👆點擊下一頁':'👆完成',W/2,H-35,16,Au,'center')}
function cRes(p2){
  if(G.cStory<0){if(p2.x>W-130&&p2.y>H-40){G.st=11;sfx.click();return}if(p2.x<130&&p2.y>H-40){G.st=0;sfx.click();return}
    const tw=170,tg=10,tox=(W-4*tw-3*tg)/2;for(let i=0;i<4;i++){const tx=tox+i*(tw+tg);if(p2.x>tx&&p2.x<tx+tw&&p2.y>220&&p2.y<360){G.cStory=i;G.cPage=0;G.resT=0;G.resReady=false;sfx.pow();return}}return}
  if(!G.resReady)return;
  if(G.cPage<2){G.cPage++;G.resT=0;G.resReady=false;sfx.click()}
  else{G.cStory=-1;G.cPage=0;G.resT=0;sfx.click()}}

// ═══ STATE 10: MOTIVATIONAL BLACK SCREEN (2nd stamina depletion) ═══
function uMot(dt){G.motT+=dt;
  if(G.motPh===0&&G.motT>2){G.motPh=1;G.motT=0}// player dialog done
  if(G.motPh===1&&G.motT>1){G.motPh=2;G.motT=0}// coaches appear
  if(G.motPh===2&&G.motT>.5)G.motWait=true;// tap to continue
}
function dMot(){
  // Full black screen - dramatic
  px(0,0,W,H,Bk);

  if(G.motPh===0){
    // Phase 0: Player inner monologue (typing effect)
    const msgs=['耐力不夠...','一定是我努力不夠...','我要加強訓練...','突破自我！'];
    const totalChars=msgs.join('').length;
    const shown=Math.min(totalChars,(G.motT*10)|0);
    let charCount=0,drawY=180;
    for(const msg of msgs){
      const start=charCount,end=charCount+msg.length;
      if(shown>start){
        const vis=msg.substring(0,Math.min(msg.length,shown-start));
        const alpha=Math.min(1,(shown-start)/msg.length);
        X.globalAlpha=alpha;
        TB(vis,W/2,drawY,26,Wh,Bk);
        X.globalAlpha=1;
      }
      charCount=end;drawY+=50;
    }
    // Heartbeat pulse effect
    const pulse=Math.sin(G.t*4)*.5+.5;
    X.globalAlpha=pulse*.1;ci(W/2,H/2,100+pulse*50,Re);X.globalAlpha=1;
    // Swimmer face (small, in darkness)
    X.globalAlpha=.5+G.motT*.2;
    dF(W/2,H/2+80,4,G.ch,'determined');
    X.globalAlpha=1;
  }
  else if(G.motPh>=1){
    // Phase 1-2: Coaches emerge from darkness
    // Dramatic light reveal
    const reveal=Math.min(1,G.motT*1.5);
    X.globalAlpha=reveal;

    // Player in center (determined face)
    dF(W/2,200,7,G.ch,'determined');

    // Speed lines
    for(let i=0;i<12;i++){const a=i/12*6.28+G.t*.3;
      X.strokeStyle=`rgba(255,215,0,${.06*reveal})`;X.lineWidth=4;
      X.beginPath();X.moveTo(W/2,200);X.lineTo(W/2+Math.cos(a)*400,200+Math.sin(a)*300);X.stroke();}

    // Player dialog
    bub(W/2-200,320,400,65,W/2,290,Go);
    const pMsg='我不會放棄！我要突破自己的極限！';
    const pShown=pMsg.substring(0,Math.min(pMsg.length,(G.motT*14)|0));
    TW(pShown,W/2-185,332,22,'#222',370);
    X.globalAlpha=1;

    if(G.motPh===2){
      // Coaches slide in
      const slideIn=Math.min(1,(G.motT)*3);
      const sX=-100+slideIn*200,pX2=W+100-slideIn*200;

      drawS(sX,490,5,0);
      bub(sX+80,430,300,55,sX+30,490,'#dd0000');
      const sMsg='相信自己，你可以做到！';
      T(sMsg.substring(0,Math.min(sMsg.length,(G.motT*12)|0)),sX+92,455,18,'#222');

      drawP(pX2,490,5,0);
      bub(pX2-370,430,300,55,pX2-30,490,'#ffbb22');
      const pMsg2='我們都在你身邊！衝吧！';
      T(pMsg2.substring(0,Math.min(pMsg2.length,(G.motT*12)|0)),pX2-358,455,18,'#222');

      // Golden light burst
      if(G.motT>1){X.globalAlpha=Math.min(.15,(G.motT-1)*.1);px(0,0,W,H,Au);X.globalAlpha=1}
    }
  }

  if(G.motWait&&Math.sin(G.t*3)>0)T('👆 我準備好了！',W/2,H-25,22,Au,'center');
}
function cMot(p){
  if(!G.motWait)return;
  sfx.pow();
  G.stam=40;// recover some stamina
  G.willp=true;
  G.st=5;// back to swim
  G.cMsg='⚡ 突破自我！全力以赴！';G.cMsgT=3;G.cMsgFrom=1;
  G.blocks=[];G.blockT=.5;
}

// ═══ STATE 11: GALLERY (animation viewer) ═══
const galN=['✨完美裝備','🔭望遠鏡','🩲大災難','SS全中運','S霸主','A菁英','B進步','C努力','D練習','🍗大雞排','🥟生煎包','⚡意志力爆發'];
let galSel=-1;
function dGal(){
  if(galSel>=0){px(0,0,W,H,'#0a0a18');const i=galSel;
    if(i<3)dF(W/2,280,10,G.ch,['happy','shock','lactic'][i]);
    else if(i<9){const g=['SS','S','A','B','C','D'][i-3];const exprs={SS:'godly',S:'proud',A:'determined',B:'normal',C:'lactic',D:'lactic'};dF(W/2,250,8,G.ch,exprs[g]);drawS(120,430,4,0);drawP(W-120,430,4,0)}
    else if(i===9)drawChicken(W/2,H/2,4);else if(i===10)drawBaozi(W/2,H/2,4);
    else{dF(W/2,280,8,G.ch,'determined');TB('⚡突破自我！',W/2,100,30,Au,Bk);drawS(120,480,4,0);drawP(W-120,480,4,0)}
    TB(galN[i],W/2,40,26,Au,Bk);
    px(10,10,110,40,'rgba(0,0,0,.8)');px(10,10,110,3,Au);T('← 返回',25,32,18,Au);
    return;}
  px(0,0,W,H,'#0a0a20');TB('🎬 動畫花絮',W/2,40,30,Au,Bk);T('點擊觀看所有事件和結局動畫',W/2,72,14,'#778','center');
  const cols=G.mobile?3:4,cw=G.mobile?130:175,ch2=55,ox=(W-cols*(cw+8))/2,oy=95;
  for(let i=0;i<galN.length;i++){const col=i%cols,row=Math.floor(i/cols);const bx=ox+col*(cw+8),by=oy+row*(ch2+8);
    const hov=G.mx>bx&&G.mx<bx+cw&&G.my>by&&G.my<by+ch2;
    px(bx,by,cw,ch2,hov?'#334455':'#1a2233');px(bx,by,cw,3,Au);T(galN[i],bx+8,by+ch2/2,14,Wh)}
  px(10,H-50,130,40,'rgba(0,0,0,.7)');px(10,H-50,130,3,Au);T('← 回標題',25,H-28,18,Au);
}
function cGal(p){
  if(galSel>=0){if(p.x<120&&p.y<50){galSel=-1;sfx.click()}return}
  const cols=G.mobile?3:4,cw=G.mobile?130:175,ch2=55,ox=(W-cols*(cw+8))/2,oy=95;
  for(let i=0;i<galN.length;i++){const col=i%cols,row=Math.floor(i/cols);const bx=ox+col*(cw+8),by=oy+row*(ch2+8);
    if(p.x>bx&&p.x<bx+cw&&p.y>by&&p.y<by+ch2){galSel=i;G.t=0;sfx.click();return}}
  if(p.x<140&&p.y>H-50){G.st=0;sfx.click()}
}

// LOOP: 0=TITLE 1=INTRO 2=CSEL 3=EQUIP 4=CD 5=SWIM 6=CUTIN 7=MINI 8=MRES 9=RES 10=MOT 11=GAL
const upd=[null,null,null,uEq,uCD,uSw,uCu,uMn,uMR,uRes,uMot,null];
const drw=[dT,dI,dCS,dEq,dCD,dSWIM,dCu,dMn,dMR,dRes,dMot,dGal];
const clk=[cT,cI,cCS,cEq,null,cSw,cCu,cMn,cMR,cRes,cMot,cGal];
function loop(ts){const dt=Math.min(.05,(ts-lastTS)/1000);lastTS=ts;G.dt=dt;G.t+=dt;G.fr++;
  while(clicks.length){const p=clicks.shift();clk[G.st]?.(p)}
  upd[G.st]?.(dt);X.clearRect(0,0,W,H);drw[G.st]?.();
  laneHit=[0,0,0,0];requestAnimationFrame(loop)}
lastTS=performance.now();requestAnimationFrame(loop);
</script>
