<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>北小泳隊：蝶王特訓 🦋</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'DotGothic16',monospace;image-rendering:pixelated;user-select:none;touch-action:manipulation;display:flex;align-items:center;justify-content:center;height:100dvh;width:100vw}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;cursor:pointer}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<script>
const C=document.getElementById('gc'),X=C.getContext('2d');
let W=800,H=600,SC=1;
function resize(){SC=Math.min(innerWidth/W,innerHeight/H);C.width=W;C.height=H;C.style.width=(W*SC)+'px';C.style.height=(H*SC)+'px';X.imageSmoothingEnabled=false}
resize();addEventListener('resize',resize);

// === Audio ===
let AC=null;function iA(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)()}
function bp(f,d,v=.1,t='square'){if(!AC)return;try{const o=AC.createOscillator(),g=AC.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d)}catch(e){}}
const sfx={perf(){bp(880,.08);setTimeout(()=>bp(1320,.06,.08),50)},good(){bp(660,.08,.08)},miss(){bp(180,.2,.1,'sawtooth')},click(){bp(500,.04,.06)},boom(){bp(80,.3,.12,'sawtooth')},pow(){bp(440,.1,.08);setTimeout(()=>bp(660,.1,.08),80);setTimeout(()=>bp(880,.15,.1),160)},go(){bp(880,.2,.12)},chomp(){bp(300,.06,.08);bp(400,.04,.06)},ouch(){bp(100,.15,.12,'sawtooth');bp(150,.1,.08,'sawtooth')}};

// === Input ===
let clicks=[],keys={},tL=false,tR=false;
function cp(e){const r=C.getBoundingClientRect();return{x:((e.clientX??(e.touches?.[0]?.clientX??0))-r.left)/SC,y:((e.clientY??(e.touches?.[0]?.clientY??0))-r.top)/SC}}
C.addEventListener('pointerdown',e=>{iA();const p=cp(e);clicks.push(p);if(G.st===7){if(p.x<130&&p.y>H-170)tL=true;else if(p.x>W-130&&p.y>H-170)tR=true}});
C.addEventListener('pointerup',()=>{tL=tR=false});
C.addEventListener('pointermove',e=>{const p=cp(e);G.mx=p.x;G.my=p.y});
addEventListener('keydown',e=>{keys[e.key]=true});addEventListener('keyup',e=>{keys[e.key]=false});

// === Draw ===
function px(x,y,w,h,c){X.fillStyle=c;X.fillRect(x|0,y|0,Math.ceil(w),Math.ceil(h))}
function ci(x,y,r,c){X.fillStyle=c;X.beginPath();X.arc(x,y,r,0,6.3);X.fill()}
function ri(x,y,r,c,l=2){X.strokeStyle=c;X.lineWidth=l;X.beginPath();X.arc(x,y,r,0,6.3);X.stroke()}
function T(s,x,y,z,c,a='left'){X.font=`bold ${z}px "DotGothic16"`;X.fillStyle=c;X.textAlign=a;X.textBaseline='middle';X.fillText(s,x|0,y|0)}
function TB(s,x,y,z,c,s2='#000',l=5){X.font=`bold ${z}px "DotGothic16"`;X.textAlign='center';X.textBaseline='middle';X.strokeStyle=s2;X.lineWidth=l;X.strokeText(s,x|0,y|0);X.fillStyle=c;X.fillText(s,x|0,y|0)}
function TW(s,x,y,z,c,mw){X.font=`bold ${z}px "DotGothic16"`;X.fillStyle=c;X.textAlign='left';X.textBaseline='top';let ln='',ly=y;for(let i=0;i<s.length;i++){const t=ln+s[i];if(X.measureText(t).width>mw&&ln){X.fillText(ln,x|0,ly|0);ly+=z+6;ln=s[i]}else ln=t}if(ln)X.fillText(ln,x|0,ly|0)}
function bub(x,y,w,h,px2,py2,bc){px(x,y,w,h,'#fff');px(x,y,w,4,bc);px(x,y+h-4,w,4,bc);px(x,y,4,h,bc);px(x+w-4,y,4,h,bc);X.fillStyle='#fff';X.beginPath();if(py2<y){X.moveTo(px2-14,y);X.lineTo(px2,py2);X.lineTo(px2+14,y)}else{X.moveTo(px2-14,y+h);X.lineTo(px2,py2);X.lineTo(px2+14,y+h)}X.fill()}
const Au='#ffd700',Re='#ff2222',Gn='#33ee55',Wh='#fff',Bk='#111',Go='#44ddff',GoH='#aaffff',Or='#ff8800',Sk='#ffcc88',SkD='#dda866',SkL='#ffe8cc',Vn='#ff0044',SB='#2255cc',SG='#dd2288';

// === Coaches ===
function drawSarsi(cx,cy,s,ang){
  px(cx-5*s,cy-7*s,10*s,18*s,'#662200');px(cx-4.5*s,cy-6*s,9*s,16*s,'#551100');px(cx-3*s,cy-5*s,2*s,12*s,'#773311');
  px(cx-2.5*s,cy-10*s,5*s,4*s,'#552200');px(cx-3*s,cy-13*s,6*s,4*s,'#dd0000');px(cx-2*s,cy-14*s,4*s,2*s,Re);
  px(cx-5*s,cy-1*s,10*s,6*s,'#ffeecc');T('沙士',cx,cy+1.5*s,3.5*s,'#cc3300','center');
  const fl=ang>.7&&G.fr%20<8;
  px(cx-4*s,cy-6.5*s,3.5*s,3*s,'#223');px(cx+.5*s,cy-6.5*s,3.5*s,3*s,'#223');
  px(cx-3.5*s,cy-6*s,2.5*s,2*s,fl?Wh:'#88bbee');px(cx+1*s,cy-6*s,2.5*s,2*s,fl?Wh:'#88bbee');
  px(cx-.5*s,cy-5.5*s,1*s,1*s,'#555');px(cx-6.5*s,cy-3*s,2*s,6*s,Sk);px(cx+4.5*s,cy-3*s,2*s,6*s,Sk);
  if(ang>.3){px(cx-4*s,cy-8*s,3.5*s,1.5*s,Bk);px(cx+.5*s,cy-8*s,3.5*s,1.5*s,Bk)}
  if(ang>.6){px(cx-2.5*s,cy-3.5*s,5*s,2.5*s,Bk);px(cx-2*s,cy-3.5*s,4*s,1*s,Wh)}else px(cx-2*s,cy-3*s,4*s,1*s,'#ccc');
  if(ang>.4){const v=.5+Math.sin(G.t*10)*.3;X.globalAlpha=v;px(cx+3*s,cy-11.5*s,2*s,2*s,Vn);px(cx+4*s,cy-12*s,1.5*s,3*s,Vn);px(cx+2.5*s,cy-11*s,2.5*s,1.5*s,Vn);X.globalAlpha=1}}
function drawPine(cx,cy,s,ang){
  px(cx-5*s,cy-5*s,10*s,14*s,'#cc8800');px(cx-4.5*s,cy-4.5*s,9*s,13*s,'#ffbb22');
  for(let r=0;r<5;r++)for(let c=0;c<4;c++)px(cx-4*s+c*2.5*s+(r%2)*1.2*s,cy-4*s+r*2.8*s,1.5*s,1.5*s,'#996600');
  px(cx-1.5*s,cy-12*s,3*s,8*s,'#33aa33');px(cx-4*s,cy-10*s,2.5*s,6*s,'#55cc44');px(cx+2*s,cy-10*s,2.5*s,6*s,'#55cc44');
  px(cx-5.5*s,cy-8*s,2*s,4*s,'#228822');px(cx+4*s,cy-8*s,2*s,4*s,'#228822');
  px(cx-7*s,cy-2*s,2.5*s,6*s,Sk);px(cx+5*s,cy-2*s,2.5*s,6*s,Sk);
  if(ang>.5){px(cx-4.5*s,cy-5*s,3.5*s,1.5*s,Bk);px(cx+1.5*s,cy-4.5*s,3.5*s,1.5*s,Bk);
    px(cx-4*s,cy-3.5*s,3*s,2.5*s,Bk);px(cx+1.5*s,cy-3.5*s,3*s,2.5*s,Bk);
    px(cx-3.5*s,cy+3*s,7*s,5*s,'#cc0000');px(cx-3*s,cy+3.3*s,6*s,1.2*s,Wh);px(cx-3*s,cy+7*s,6*s,1.2*s,Wh);
    for(let i=0;i<8;i++){const ft=Math.sin(G.t*12+i*1.5);px(cx-8*s+i*2.2*s,cy+9*s-ft*5*s,2*s,4*s+ft*3*s,['#ff3300','#ff8800','#ffcc00'][i%3])}}
  else{px(cx-3.5*s,cy-3.5*s,2.5*s,2.5*s,'#333');px(cx+1.5*s,cy-3.5*s,2.5*s,2.5*s,'#333');px(cx-2*s,cy+3*s,4*s,1.5*s,'#555')}}

// === Face ===
function drawFace(cx,cy,s,ch,expr){
  const g=ch===1,cap=g?'#ff66aa':'#3388ff',capD=g?'#cc3388':'#2266aa';
  px(cx-10*s,cy-12*s,20*s,24*s,Sk);px(cx-9*s,cy-11*s,18*s,22*s,SkL);
  px(cx-11*s,cy-16*s,22*s,8*s,cap);px(cx-10*s,cy-15*s,20*s,5*s,capD);
  if(g){px(cx-12*s,cy-12*s,4*s,14*s,'#553322');px(cx+8*s,cy-12*s,4*s,14*s,'#553322')}
  px(cx-8*s,cy-8*s,7*s,4*s,Go);px(cx+1*s,cy-8*s,7*s,4*s,Go);px(cx-1*s,cy-7*s,2*s,2*s,'#556');
  const ex=cx-6*s,ey=cy-1*s;
  if(expr==='happy'){
    px(ex,ey-s,5*s,1.5*s,Bk);px(ex+.5*s,ey-3*s,4*s,1.5*s,Bk);px(ex+8*s,ey-s,5*s,1.5*s,Bk);px(ex+8.5*s,ey-3*s,4*s,1.5*s,Bk);
    px(cx-4*s,cy+5*s,8*s,2*s,'#cc8866');px(cx-3*s,cy+7*s,6*s,2*s,Wh);
    X.globalAlpha=.35;px(cx-9*s,cy+3*s,5*s,3*s,'#ff8888');px(cx+4*s,cy+3*s,5*s,3*s,'#ff8888');X.globalAlpha=1;
    if(G.fr%20<12){px(cx-11*s,cy-7*s,2*s,5*s,Au);px(cx-12*s,cy-5*s,4*s,2*s,Au);px(cx+9*s,cy-6*s,2*s,4*s,Au);px(cx+8*s,cy-5*s,4*s,2*s,Au)}
  }else if(expr==='determined'){
    px(ex-s,ey-5*s,6*s,2*s,Bk);px(ex+7*s,ey-4*s,6*s,2*s,Bk);
    px(ex+s,ey-2*s,5*s,4*s,Wh);px(ex+8*s,ey-2*s,5*s,4*s,Wh);
    px(ex+2.5*s,ey-s,2.5*s,3*s,Bk);px(ex+9.5*s,ey-s,2.5*s,3*s,Bk);
    px(cx-3.5*s,cy+5*s,7*s,3*s,Wh);for(let i=0;i<3;i++)px(cx-2.5*s+i*2.5*s,cy+5.5*s,1*s,2*s,Bk);
    if(G.fr%4<3)for(let i=0;i<6;i++)px(cx-10*s+i*4*s,cy-10*s-Math.sin(G.t*10+i)*3*s,2.5*s,4*s,i%2?'#ff4400':'#ffaa00');
  }else if(expr==='lactic'){
    TB('×',ex+3*s,ey,4*s,Re,Bk,2);TB('×',ex+10*s,ey,4*s,Re,Bk,2);
    px(cx-3.5*s,cy+4*s,7*s,5*s,'#cc3333');px(cx-2*s,cy+7*s,5*s,3*s,'#ff7777');px(cx-2.5*s,cy+4.5*s,5*s,1.5*s,Wh);
    if(G.fr%30<18){px(cx+9*s,cy-5*s,2.5*s,4*s,'#44aaff');ci(cx+10*s,cy+.5*s,1.5*s,'#44aaff')}
    X.globalAlpha=.2;px(cx-8*s,cy-2*s,16*s,6*s,'#ff3333');X.globalAlpha=1;
    if(G.fr%50<25){X.globalAlpha=.3;T('魂',cx+6*s,cy-12*s-Math.sin(G.t*3)*3*s,5*s,'#aaf');X.globalAlpha=1}
  }else if(expr==='shock'){
    px(ex+s,ey-3*s,5*s,5*s,Wh);px(ex+8*s,ey-3*s,5*s,5*s,Wh);px(ex+2.5*s,ey-s,2*s,2*s,Bk);px(ex+9.5*s,ey-s,2*s,2*s,Bk);
    ci(cx,cy+6*s,3.5*s,'#cc3333');ci(cx,cy+6*s,2*s,'#880000');px(cx+10*s,cy-5*s,3*s,6*s,'#44aaff');
  }else if(expr==='proud'){
    // Strong pose face: big grin + sparkle eyes
    px(ex+s,ey-2*s,5*s,4*s,Wh);px(ex+8*s,ey-2*s,5*s,4*s,Wh);
    px(ex+2*s,ey-s,2.5*s,3*s,'#2244cc');px(ex+9*s,ey-s,2.5*s,3*s,'#2244cc');
    // Star pupils
    px(ex+2.5*s,ey-.5*s,1.5*s,1.5*s,Wh);px(ex+9.5*s,ey-.5*s,1.5*s,1.5*s,Wh);
    px(cx-4*s,cy+4*s,8*s,3*s,'#cc8866');px(cx-3*s,cy+5*s,6*s,2.5*s,Wh);
    // Flex marks
    px(cx-12*s,cy-3*s,2*s,8*s,Sk);px(cx-13*s,cy-1*s,1.5*s,4*s,SkD);
    px(cx+10*s,cy-3*s,2*s,8*s,Sk);px(cx+11*s,cy-1*s,1.5*s,4*s,SkD);
    // Sparkles
    for(let i=0;i<4;i++){const a=i/4*6.28+G.t*3;px(cx+Math.cos(a)*14*s,cy+Math.sin(a)*10*s,2*s,2*s,Au)}
  }else if(expr==='godly'){
    // SS: golden aura face
    px(ex+s,ey-2*s,5*s,4*s,Au);px(ex+8*s,ey-2*s,5*s,4*s,Au);
    px(ex+2.5*s,ey-s,2.5*s,3*s,Wh);px(ex+9.5*s,ey-s,2.5*s,3*s,Wh);
    px(cx-4*s,cy+4*s,8*s,3*s,'#cc8866');px(cx-3*s,cy+6*s,6*s,2*s,Wh);
    X.globalAlpha=.35;px(cx-9*s,cy+2*s,5*s,3*s,'#ff8888');px(cx+4*s,cy+2*s,5*s,3*s,'#ff8888');X.globalAlpha=1;
  }else{
    px(ex+s,ey-2*s,4*s,4*s,Wh);px(ex+8*s,ey-2*s,4*s,4*s,Wh);px(ex+2*s,ey-s,2*s,2.5*s,Bk);px(ex+9*s,ey-s,2*s,2.5*s,Bk);px(cx-2.5*s,cy+5*s,5*s,1.5*s,'#cc8866');
  }
}

// === Mouth-up face for mini-game (looking UP, mouth wide open at top) ===
function drawMouthUp(cx,cy,s,ch,eating,hurt){
  const cap=ch===1?'#ff66aa':'#3388ff',capD=ch===1?'#cc3388':'#2266aa';
  // Head
  px(cx-8*s,cy-6*s,16*s,18*s,Sk);px(cx-7*s,cy-5*s,14*s,16*s,SkL);
  // Cap at bottom (head tilted up, cap visible at chin area)
  px(cx-9*s,cy+8*s,18*s,5*s,cap);px(cx-8*s,cy+9*s,16*s,3*s,capD);
  // Goggle strap
  px(cx-8*s,cy+5*s,16*s,2*s,Go);
  if(hurt){
    // OUCH face: spiral eyes + shock
    ri(cx-3*s,cy+1*s,2.5*s,'#cc4444',1.5);ri(cx+3*s,cy+1*s,2.5*s,'#cc4444',1.5);
    px(cx-3*s,cy-6*s,6*s,4*s,'#cc3333'); // closed mouth
    // Stars around head
    for(let i=0;i<5;i++){const a=i/5*6.28+G.t*8;T('★',cx+Math.cos(a)*10*s,cy+Math.sin(a)*8*s,3*s,Au)}
    // Sweat
    px(cx+8*s,cy-2*s,2*s,4*s,'#44aaff');
  }else if(eating){
    // CHOMP face: eyes squeezed, mouth chewing
    px(cx-5*s,cy,5*s,1.5*s,Bk);px(cx+1*s,cy,5*s,1.5*s,Bk); // ^_^ eyes
    // Chewing mouth (small, satisfied)
    px(cx-2*s,cy-5*s,4*s,2*s,'#cc8866');
    px(cx-1.5*s,cy-4.5*s,3*s,1*s,Wh);
    // Happy blush
    X.globalAlpha=.3;px(cx-7*s,cy+2*s,4*s,2*s,'#ff8888');px(cx+3*s,cy+2*s,4*s,2*s,'#ff8888');X.globalAlpha=1;
  }else{
    // MOUTH WIDE OPEN (looking up, mouth at top of face = top of drawing)
    // Big open mouth - THE SCORING AREA
    px(cx-5*s,cy-8*s,10*s,6*s,'#cc3333'); // mouth bg
    px(cx-4*s,cy-7.5*s,8*s,5*s,'#880000'); // throat
    px(cx-4.5*s,cy-8*s,9*s,1.5*s,Wh); // top teeth
    px(cx-4.5*s,cy-3*s,9*s,1.5*s,Wh); // bottom teeth
    // Tongue
    px(cx-2*s,cy-5*s,4*s,2.5*s,'#ff7777');
    // Eyes wide (looking up expectantly)
    px(cx-5*s,cy+.5*s,4*s,3.5*s,Wh);px(cx+1*s,cy+.5*s,4*s,3.5*s,Wh);
    px(cx-4*s,cy+1*s,2*s,2.5*s,Bk);px(cx+2*s,cy+1*s,2*s,2.5*s,Bk);
    // Eyebrows
    px(cx-5.5*s,cy+4*s,4.5*s,1.5*s,Bk);px(cx+1*s,cy+4*s,4.5*s,1.5*s,Bk);
  }
}

// === Backgrounds ===
function bgPool(){for(let y=0;y<H;y+=4)px(0,y,W,4,`rgb(${14+(y/H)*8|0},${34+(y/H)*18|0},${64+(y/H)*28|0})`);for(let i=0;i<6;i++){const lx=130+i*108;for(let ly=0;ly<H;ly+=12)px(lx,ly,3,6,ly%24<12?'#224060':'#2a5575')}}
function bgSchool(){for(let y=0;y<250;y+=4)px(0,y,W,4,`rgb(${100+y/4|0},${150+y/5|0},220)`);px(0,420,W,180,'#889977');px(80,130,640,290,'#ddccaa');for(let f=0;f<3;f++)for(let w=0;w<6;w++)px(120+w*95,160+f*85,44,38,'#5588aa');px(W/2-80,210,160,210,'#887744');px(W/2-55,235,110,35,Wh);T('臺北市北小',W/2,256,16,'#333','center');px(65,160,5,260,'#555');px(70,168,22,14,Re)}
function bgNight(){px(0,0,W,H,'#1a1028');for(let i=0;i<20;i++)px((i*47)%W,(i*31)%150,2,2,'#ffd');for(let i=0;i<8;i++){const bh=200+Math.sin(i)*40;px(i*100,H-bh,90,bh,`hsl(${20+i*5},30%,${25+i*3}%)`)}px(0,H-80,W,80,'#333')}

// === Swimmer ===
function drawSw(cx,cy,ph,ch,st,sc){
  const s=sc*2.5,su=ch===1?SG:SB,suD=ch===1?'#991166':'#1a3d99',lac=st<30,sk=lac?'#ffaaaa':Sk,skd=lac?'#dd8888':SkD,ca=ch===1?SG:SB;
  const segN=8,segH=5.5*sc,segs=[];
  for(let i=0;i<segN;i++){const p2=ph-i*.5,w2=Math.sin(p2)*2.5*sc,d=Math.cos(p2);let w;if(i===0)w=5*sc;else if(i===1)w=7*sc;else if(i<4)w=8*sc;else if(i<6)w=6*sc;else w=4*sc;w*=(.88+d*.12);segs.push({y:cy-segN*segH/2+i*segH+w2,w,depth:d,wave:w2})}
  const kick=Math.sin(ph*2)*3.5*sc;for(let i=5;i<segN;i++){const sg=segs[i],lw=sg.w*.4;px(cx-lw,sg.y,lw*2,segH+1,sk)}
  const ftY=segs[segN-1].y+segH;px(cx-2*sc+kick*.3,ftY,4*sc,4*sc,skd);
  for(let i=2;i<5;i++){const sg=segs[i];px(cx-sg.w/2,sg.y,sg.w,segH+1,sg.depth>.2?su:suD)}
  const sh=segs[1];px(cx-sh.w/2-1.5*s,sh.y,sh.w+3*s,segH,sk);
  const ac=((ph*.5)%(Math.PI*2)+Math.PI*2)%(Math.PI*2),shY=segs[1].y+segH/2,shHW=sh.w/2+1.5*s;
  if(ac<Math.PI){const t=ac/Math.PI,sp=Math.sin(t*Math.PI)*32*sc,fw=-t*24*sc,bs=(1-t)*12*sc,hY=shY+bs+fw;

function cCu(){if(!G.cutWait)return;sfx.click();G.cutWait=0;G.cutT=0;G.cutPh++;if(G.cutPh>=3){G.st=7;G.mnTy=Math.random()>.5?1:0;G.mnT=30;G.mnSc=0;G.mnTg=10+G.diff*5;G.mnItems=[];G.mnPX=W/2;G.mnEat=0;G.mnHurt=0}}

// =============================================
//  MINI-GAME: MOUTH-UP CATCHING!
//  Character faces upward, mouth open, catch items!

function uMn(dt){G.mnT-=dt;G.mnEat=Math.max(0,G.mnEat-dt*4);G.mnHurt=Math.max(0,G.mnHurt-dt*3);
  const ms=320*dt;if(keys.ArrowLeft||keys.a||tL)G.mnPX-=ms;if(keys.ArrowRight||keys.d||tR)G.mnPX+=ms;
  G.mnPX=Math.max(40,Math.min(W-40,G.mnPX));
  // Spawn items - MUCH more spaced
  if(Math.random()<.04+G.diff*.015){
    const good=Math.random()>.3; // 70% good items
    G.mnItems.push({x:60+Math.random()*(W-120),y:-30,
      type:good?(G.mnTy===0?'s':'p'):'b',
      spd:90+Math.random()*60+G.diff*20})}
  // MOUTH hitbox is at top of character head (y - mouthRadius)
  const mouthY=160; // mouth Y position
  const mouthR=20; // mouth catch radius
  for(let i=G.mnItems.length-1;i>=0;i--){
    const it=G.mnItems[i];it.y+=it.spd*dt;
    // Check if item reaches mouth level
    if(Math.abs(it.x-G.mnPX)<28&&Math.abs(it.y-mouthY)<mouthR){
      if(it.type==='b'){G.mnSc=Math.max(0,G.mnSc-3);sfx.ouch();G.mnHurt=1;
        // Explosion particles
        for(let j=0;j<8;j++)G.splashes.push({x:it.x,y:it.y,vx:(Math.random()-.5)*200,vy:(Math.random()-.5)*200,life:.5,c:Re,sz:4})}
      else{G.mnSc++;sfx.chomp();G.mnEat=1;
        // Happy sparkle
        for(let j=0;j<5;j++)G.splashes.push({x:it.x,y:it.y,vx:(Math.random()-.5)*100,vy:-Math.random()*100,life:.4,c:Au,sz:3})}
      G.mnItems.splice(i,1);continue}
    if(it.y>H+30)G.mnItems.splice(i,1)}
  uPa(dt);
  if(G.mnT<=0||G.mnSc>=G.mnTg){G.mnOk=G.mnSc>=G.mnTg;if(G.mnOk){G.stam=55;G.willp=1;sfx.pow()}else G.stam=18;G.st=8;G.mrWait=0;G.cutT=0}}
function dMn(){

  for(let y=0;y<H;y+=4)px(0,y,W,4,`rgb(${20+y/8|0},${50+y/6|0},${90+y/5|0})`);
  // Pool edge at top
  px(0,0,W,40,'#ccbbaa');px(0,37,W,3,'#aaa');
  TB(G.mnTy===0?'🥤接住沙士！':'🍍接住鳳梨！',W/2,60,24,G.mnTy===0?'#dd0000':'#ffbb22',Bk);
  px(150,80,500,14,'#222');px(150,80,500*(G.mnT/30),14,G.mnT>10?Gn:Re);T(`${Math.ceil(G.mnT)}s`,W/2,88,14,Wh,'center');
  TB(`${G.mnSc}/${G.mnTg}`,W/2,115,28,Au,Bk);
  // Score feedback flash
  if(G.mnEat>0){X.globalAlpha=G.mnEat*.5;TB('好吃！+1',W/2,145,20,Au,Bk);X.globalAlpha=1}

  // Items falling (with clear visual distinction!)
  G.mnItems.forEach(it=>{

      // Spikes radiating out (very different from round items!)
      for(let j=0;j<8;j++){const a=j/8*6.28+G.t*3;
        px(it.x+Math.cos(a)*13-3,it.y+Math.sin(a)*13-3,6,6,Re)}

      px(it.x-2,it.y-16,4,6,'#ff8800');

      // Warning ring (red)

  });

  // === CHARACTER: facing UP, mouth open at top ===
  const pcx=G.mnPX,pcy=200;
  drawMouthUp(pcx,pcy,4,G.ch,G.mnEat>0,G.mnHurt>0);
  // Mouth target indicator (dotted circle showing catch zone)
  if(G.mnEat<=0&&G.mnHurt<=0){
    X.globalAlpha=.3+Math.sin(G.t*6)*.1;ri(pcx,160,22,Au,2);X.globalAlpha=1;
    T('↑嘴巴',pcx,138,12,Au,'center');
  }
  dPa();
  // L/R buttons
  X.globalAlpha=tL?.7:.4;px(8,H-170,120,110,'#223355');X.globalAlpha=tR?.7:.4;px(W-128,H-170,120,110,'#223355');X.globalAlpha=1;
  TB('◀',68,H-115,40,Wh,Bk);TB('▶',W-68,H-115,40,Wh,Bk);
  // Legend
  px(W/2-180,H-45,360,35,'rgba(0,0,0,.7)');
  T('🟢接住補給',W/2-100,H-28,14,Gn);T('🔴閃避炸彈',W/2+60,H-28,14,Re);
}
function cMn(p){if(p.x<130&&p.y>H-170){tL=1;setTimeout(()=>tL=0,150)}else if(p.x>W-130&&p.y>H-170){tR=1;setTimeout(()=>tR=0,150)}else if(p.y>100&&p.y<H-170)G.mnPX=p.x}

// === MINI RES ===
function uMR(dt){G.cutT+=dt;if(G.cutT>.5)G.mrWait=1}
function dMR(){X.fillStyle='rgba(0,0,0,.92)';X.fillRect(0,0,W,H);px(40,20,W-80,540,'rgba(8,16,32,.95)');px(40,20,W-80,3,Au);if(G.mnOk){X.strokeStyle=Au;X.lineWidth=6;X.beginPath();X.moveTo(W/2,35);X.lineTo(W/2-30,120);X.lineTo(W/2+15,120);X.lineTo(W/2-20,210);X.stroke();TB('⚡意志力爆發！⚡',W/2,65,28,Au,Bk);drawFace(W/2,290,8,G.ch,'determined');drawPine(130,460,4.5,0);bub(210,415,490,80,200,470,'#ffbb22');TW('有撐住就是進步！衝刺到底！',230,430,22,'#333',450)}else{TB('時間到...',W/2,65,28,Re,Bk);drawFace(W/2,280,8,G.ch,'lactic');drawPine(130,450,4.5,.5);bub(210,410,490,75,200,460,'#ffbb22');TW('不能放棄！回去繼續撐！',230,425,22,'#622',450)}TB(`體力回復${G.stam|0}%`,W/2,530,22,G.mnOk?Gn:Re,Bk);if(G.mrWait&&Math.sin(G.t*3)>0)T('👆點擊回到比賽',W/2,560,22,Au,'center')}
function cMR(){if(!G.mrWait)return;sfx.click();G.st=5;G.cMsg=G.mnOk?'⚡全力衝刺到底！':'不能放棄！撐住！';G.cMsgT=2.5;G.cMsgFrom=1;G.rings=[];G.ringT=.5}

// =============================================
//  RESULTS: FULL-SCREEN ANIMATED PER GRADE!
// =============================================
function cGr(){const acc=G.totN>0?(G.perf+G.good*.5)/G.totN:0;G.score+=G.mxCombo*150+G.attSc*25;const t=G.fTime;
  // Calibrated to real butterfly times
  // 25m: SS<18s, S<22s, A<26s, B<32s, C<38s
  // 50m: SS<35s, S<42s, A<50s, B<60s, C<75s
  if(G.tDist<=25){if(t<18&&acc>.85)G.grade='SS';else if(t<22&&acc>.7)G.grade='S';else if(t<26&&acc>.6)G.grade='A';else if(t<32)G.grade='B';else G.grade='C'}
  else{if(t<35&&acc>.9)G.grade='SS';else if(t<42&&acc>.8)G.grade='S';else if(t<50&&acc>.7)G.grade='A';else if(t<60)G.grade='B';else if(t<75)G.grade='C';else G.grade='D'}G.rwTy=Math.random()>.5?0:1}

function dRes(){G.resT+=G.dt;
  // ═══ FULL-SCREEN ANIMATED ENDINGS ═══
  if(G.grade==='SS'){
    // === SS: GOLDEN GODLY AURA + CROWD + FIREWORKS ===
    bgPool();
    // Golden overlay
    X.globalAlpha=.15+Math.sin(G.t*2)*.05;px(0,0,W,H,Au);X.globalAlpha=1;
    // God rays from character
    for(let i=0;i<16;i++){const a=i/16*6.28+G.t*.3;X.strokeStyle=`rgba(255,215,0,${.15+Math.sin(G.t*3+i)*.05})`;X.lineWidth=8;X.beginPath();X.moveTo(W/2,250);X.lineTo(W/2+Math.cos(a)*400,250+Math.sin(a)*300);X.stroke()}
    // HUGE character with golden aura
    X.globalAlpha=.3;ci(W/2,250,100+Math.sin(G.t*4)*10,Au);X.globalAlpha=.15;ci(W/2,250,130+Math.sin(G.t*3)*15,Au);X.globalAlpha=1;
    drawFace(W/2,240,9,G.ch,'godly');
    TB('全中運傳說！',W/2,45,36,'#ff44ff',Bk);
    // Crowd (small jumping people)
    for(let i=0;i<12;i++){const jx=30+i*65,jy=440-Math.abs(Math.sin(G.t*6+i*1.3))*25;
      px(jx,jy,8,12,['#ff4','#4ff','#f4f','#ff8','#4f4'][i%5]);px(jx+1,jy-5,6,6,Sk);
      if(Math.sin(G.t*6+i*1.3)>0)T('!',jx+4,jy-15,10,Au,'center')}
    // Coaches celebrating
    drawSarsi(80,380,4,0);drawPine(W-80,380,4,0);
    // Fireworks!
    for(let i=0;i<15;i++){const fx=(i*73+G.resT*50)%W,fy=100+Math.abs(Math.sin(G.resT*1.5+i))*200;
      ci(fx,fy,4+Math.sin(G.t*8+i)*2,['#ff4444','#44ff44','#4444ff','#ffff44','#ff44ff'][i%5])}
    // Confetti
    for(let i=0;i<60;i++){const cc=['#f44','#4f4','#44f','#ff4','#f4f','#4ff'][i%6];px((i*47+G.resT*80)%W,(i*67+G.resT*40)%H,5,5,cc)}
    // Stats
    px(0,490,W,40,'rgba(0,0,0,.7)');T(`${G.fTime.toFixed(2)}秒 P:${G.perf} G:${G.good} M:${G.miss} 連擊:${G.mxCombo} 態度:${G.attSc|0}`,W/2,510,14,Au,'center');

  }
  else if(G.grade==='S'){
    // === S: PODIUM + GOLD MEDAL ===

    // Podium
    px(W/2-80,320,160,30,Au);px(W/2-60,350,120,50,'#ccaa44');px(W/2-40,400,80,30,'#bb9933');
    T('1',W/2,365,30,Wh,'center');
    // Character on podium with medal
    drawFace(W/2,260,8,G.ch,'proud');
    // Medal on neck (golden circle)
    ci(W/2,340,12,Au);ci(W/2,340,9,'#ffee55');T('金',W/2,340,10,'#cc8800','center');
    // Medal sparkle
    for(let i=0;i<8;i++){const a=i/8*6.28+G.t*2;ci(W/2+Math.cos(a)*18,340+Math.sin(a)*12,2,Wh)}
    TB('市中運霸主！',W/2,45,34,Au,Bk);
    // Coaches clapping
    drawSarsi(130,380,4,0);drawPine(W-130,380,4,0);
    // Clap effect
    if(G.fr%30<15){T('👏',170,360,16,Wh);T('👏',W-170,360,16,Wh)}
    px(0,450,W,80,'rgba(0,0,0,.7)');T(`${G.fTime.toFixed(2)}秒 P:${G.perf} G:${G.good} M:${G.miss} 連擊:${G.mxCombo}`,W/2,475,14,Au,'center');
    px(0,500,W,35,'rgba(0,0,0,.8)');T('鳳梨教練：不放棄的你最帥了！！',W/2,518,16,'#ffdd66','center');
    // Confetti
    for(let i=0;i<30;i++)px((i*53+G.resT*60)%W,(i*71+G.resT*30)%H,4,4,['#f44','#4f4','#44f','#ff4'][i%4]);
  }
  else if(G.grade==='A'){
    // === A: SCHOOL GATE + FLEX POSE ===
    bgSchool();
    // Character doing strong pose!
    drawFace(W/2,270,8,G.ch,'proud');

    px(W/2+65,260,15,50,Sk);px(W/2+65,245,20,20,Sk); // right bicep
    TB('北小校隊菁英！',W/2,60,30,Gn,Bk);
    // Both coaches clapping at sides
    drawSarsi(100,380,4,0);drawPine(W-100,380,4,0);
    if(G.fr%24<12){T('👏',140,360,18,Wh);T('👏',W-140,360,18,Wh)}
    // Sparkles
    for(let i=0;i<6;i++){const a=i/6*6.28+G.t*2;ci(W/2+Math.cos(a)*90,270+Math.sin(a)*60,3,Au)}
    px(0,450,W,80,'rgba(0,0,0,.7)');T(`${G.fTime.toFixed(2)}秒 P:${G.perf} G:${G.good} M:${G.miss} 連擊:${G.mxCombo}`,W/2,475,14,Gn,'center');

  }

    // Speech
    bub(280,10,350,60,190,65,'#dd0000');T('繼續練！一定有難度',300,30,16,'#222');T('但不完成怎麼進步？',300,50,16,'#222');
    // Encouraging fist
    if(G.fr%40<20){T('💪',W-160,35,20,Wh)}
    px(0,480,W,50,'rgba(0,0,0,.7)');T(`${G.fTime.toFixed(2)}秒 P:${G.perf} G:${G.good} M:${G.miss} 態度:${G.attSc|0}`,W/2,505,14,'#aab','center');
    px(0,530,W,35,'rgba(0,0,0,.8)');T('鳳梨教練：辛苦是進步的必經之路！別放棄！',W/2,548,14,'#ffdd66','center');
    drawFace(W/2,420,5,G.ch,G.grade==='B'?'normal':'lactic');
  }
  else{
    // === D: POOLSIDE LECTURE ===
    bgPool();
    px(0,0,W,120,'#ccbbaa'); // big pool deck
    TB('繼續練習！',W/2,240,28,'#888',Bk);
    // Character sitting on pool edge
    drawFace(W/2,350,7,G.ch,'lactic');
    // Both coaches standing over character, lecturing
    drawSarsi(200,100,5,.7);drawPine(W-200,100,5,.5);
    // Big speech bubbles
    bub(290,20,350,80,190,110,'#dd0000');TW('找出問題，去修正！不是看心情！',310,35,18,'#222',310);
    bub(W-490,20,350,80,W-190,110,'#ffbb22');TW('不能隨便放棄！辛苦是進步的路！',W-470,35,18,'#222',310);
    // Sweat/shame effect on character
    if(G.fr%20<12){T('💦',W/2+50,320,14,Wh);T('...',W/2-30,310,20,'#aaa','center')}
    px(0,480,W,50,'rgba(0,0,0,.7)');T(`${G.fTime.toFixed(2)}秒 P:${G.perf} G:${G.good} M:${G.miss}`,W/2,505,14,'#888','center');
    px(0,530,W,35,'rgba(0,0,0,.8)');T('做人處事的態度，比成績更重要！',W/2,548,16,Au,'center');
  }

  // Reward (all grades except D)
  if(G.grade!=='D'&&G.grade!=='B'&&G.grade!=='C'){
    px(W/2-150,H-60,300,40,'rgba(10,8,0,.9)');px(W/2-150,H-60,300,3,Au);
    T(G.rwTy===0?'🍗解鎖：師大夜市大雞排！':'🥟解鎖：科技大樓站生煎包！',W/2,H-38,14,Au,'center');
  }

}
function cR(){G.st=1;G.stam=100;G.combo=0;G.mxCombo=0;G.score=0;G.perf=0;G.good=0;G.miss=0;G.totN=0;G.dist=0;G.gTime=0;G.swPh=0;G.rings=[];G.bubs=[];G.splashes=[];G.cAnger=[0,0];G.spMul=1;G.willp=0;G.mosT=0;G.invisR=0;G.attSc=100;G.inpQ=[];G.flT=0;G.cMsgT=0;sfx.click()}

// === LOOP ===
const upd=[null,null,null,uEq,uCD,uSw,uCu,uMn,uMR];
const drw=[dI,dT,dCS,dEq,dCD,dSw,dCu,dMn,dMR,dRes];
const clk=[cI,cT,cCS,cEq,null,cSw,cCu,cMn,cMR,cR];
function loop(ts){const dt=Math.min(.05,(ts-lastTS)/1000);lastTS=ts;G.dt=dt;G.t+=dt;G.fr++;
  while(clicks.length){const p=clicks.shift();clk[G.st]?.(p)}
  upd[G.st]?.(dt);X.clearRect(0,0,W,H);drw[G.st]?.();
  requestAnimationFrame(loop)}
lastTS=performance.now();requestAnimationFrame(loop);
